# dep-graph/provenance.yml
#
# Structured provenance for fork-sync-all.
# Records every upstream project whose logic, schema, pattern, or concept
# was extracted, adapted, or used as a reference point in this codebase.
#
# This file is read by generate_origins() in scripts/update-readmes.sh
# to render the ## Origins section of README.md with richer attribution
# than the fork-relationship data in dep-graph/origins.md alone.
#
# ── Field reference ───────────────────────────────────────────────────────────
#
#   source      — upstream project in "owner/repo" format
#   url         — canonical URL of the upstream project
#   relationship — one of:
#                   fork            — this repo is a GitHub fork of source
#                   extracted-logic — logic/algorithm taken and reimplemented
#                   inspired-by     — concept/approach inspired the design
#                   reference       — used as a reference implementation
#                   schema-adopted  — data schema / file format adopted
#                   pattern-adopted — code pattern / convention adopted
#   what        — one sentence describing what was taken / how it influenced
#   artifact    — file(s) in this repo that embody the influence (optional)
#   notes       — additional context (optional)
#
# ── Maintenance ───────────────────────────────────────────────────────────────
#
# Update this file whenever a new upstream influence is introduced.
# The generate_origins() function reads it at README generation time —
# no manual README edits needed.

