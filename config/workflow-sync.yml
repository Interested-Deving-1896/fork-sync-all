# workflow-sync.yml
#
# Single source of truth for the GitHub Actions ↔ GitLab CI job mapping.
#
# Each entry under `paired` describes one logical job that exists on both
# platforms. The validator (scripts/validate-workflow-guards.py) checks:
#   - github.workflow_file exists in .github/workflows/
#   - gitlab.job exists in .gitlab-ci.yml
#   - every script listed under scripts exists in scripts/
#   - env_vars declared here are present in both workflow files
#
# Entries under `github_only` and `gitlab_only` are informational — they
# document intentional asymmetry and suppress false-positive drift warnings.
#
# Fields:
#   name          Human-readable description of what the job does
#   scripts       Scripts called by both sides (the shared implementation)
#   github:
#     workflow_file   Filename under .github/workflows/
#     schedule        GitHub cron expression (if scheduled)
#   gitlab:
#     job             Job name in .gitlab-ci.yml
#     cadence         CADENCE variable value that activates this job
#                     (poller | daily | weekly | manual | push)
#   env_vars        Env vars that must be present in both platform configs
#                   (secrets/CI variables are excluded — they differ by platform)
#   notes           Optional explanation of known differences between platforms

paired:

  - name: Sync All Forks
    scripts:
      - sync-all-forks.sh   # GitHub entry point (also called by sync-forks.sh)
    github:
      workflow_file: sync-forks.yml
      schedule: null        # no fixed schedule — triggered on demand
    gitlab:
      job: sync-forks
      cadence: daily
      script: sync-forks.sh  # GitLab wrapper — delegates to sync-all-forks.sh
    env_vars:
      - GH_TOKEN
      - GITHUB_OWNER
    notes: >
      GitLab uses sync-forks.sh as a thin wrapper around sync-all-forks.sh
      to adapt GitHub-centric env var names for the GitLab runner context.
      The validator checks sync-forks.sh on the GitLab side.

  - name: Mirror Artifacts
    scripts:
      - mirror-artifacts.sh
    github:
      workflow_file: mirror-artifacts.yml
      schedule: null
    gitlab:
      job: mirror-artifacts
      cadence: trigger   # activated by downstream pipeline trigger, not CADENCE schedule
    env_vars:
      - GH_TOKEN
      - GITHUB_OWNER

  - name: Mirror to OSP
    scripts:
      - mirror-to-osp.sh
    github:
      workflow_file: mirror-to-osp.yml
      schedule: "0 * * * *"
    gitlab:
      job: mirror-to-ospf1896
      cadence: weekly
    env_vars:
      - GH_TOKEN
      - GITHUB_OWNER
    notes: >
      GitHub runs this hourly; GitLab runs it weekly as a fallback.
      The GitHub schedule is the authoritative cadence.

  - name: Add Mirror Repo
    scripts:
      - add-mirror-repo.sh
    github:
      workflow_file: add-mirror-repo.yml
      schedule: null
    gitlab:
      job: add-mirror-repo
      cadence: manual
    env_vars:
      - GH_TOKEN

  - name: Setup OSP Mirrors
    scripts:
      - setup-osp-mirrors.sh
    github:
      workflow_file: setup-osp-mirrors.yml
      schedule: null
    gitlab:
      job: setup-ospf1896-mirrors
      cadence: manual
    env_vars:
      - GH_TOKEN

  - name: Reconcile Org References
    scripts:
      - reconcile-org-refs.sh
    github:
      workflow_file: reconcile-org-refs.yml
      schedule: null
    gitlab:
      job: reconcile-org-refs
      cadence: weekly
    env_vars:
      - GH_TOKEN
      - UPSTREAM_OWNER
      - OSP_ORG
      - OOC_ORG

  - name: Rebuild LTS Branch
    scripts:
      - rebase-lts.sh
    github:
      workflow_file: rebase-lts.yml
      schedule: null
    gitlab:
      job: rebase-lts
      cadence: weekly
    env_vars:
      - GH_TOKEN

  - name: Sync penguins-eggs Docs to Book
    scripts:
      - sync-eggs-docs-to-book.sh
    github:
      workflow_file: sync-eggs-docs-to-book.yml
      schedule: null
    gitlab:
      job: sync-eggs-docs-to-book
      cadence: daily
    env_vars:
      - GH_TOKEN

  - name: Sync pieroproietti Forks
    scripts:
      - sync-pieroproietti-forks.sh
    github:
      workflow_file: sync-pieroproietti-forks.yml
      schedule: null
    gitlab:
      job: sync-pieroproietti-forks
      cadence: daily
    env_vars:
      - GH_TOKEN

  - name: Upstream PRs
    scripts:
      - upstream-prs.sh
    github:
      workflow_file: upstream-prs.yml
      schedule: null
    gitlab:
      job: upstream-prs
      cadence: daily
    env_vars:
      - GH_TOKEN
      - GITHUB_OWNER

  - name: Resolve CI Failures
    scripts:
      - resolve-failures.sh
    github:
      workflow_file: resolve-failures.yml
      schedule: null
    gitlab:
      job: resolve-failures
      cadence: daily
    env_vars:
      - GH_TOKEN
      - GITHUB_OWNER

  - name: Rate-Limit Re-trigger
    scripts:
      - scan-rate-limit-failures.sh
      - rerun-after-rate-limit.sh
    github:
      workflow_file: rate-limit-rerun.yml
      schedule: "*/30 * * * *"
    gitlab:
      job: rate-limit-rerun
      cadence: poller
    env_vars:
      - GH_TOKEN
      - GITHUB_OWNER
      - GITHUB_REPO
    notes: >
      Loop guard: re-dispatched GitHub workflows carry rate_limit_rerun=true.
      The scanner skips runs whose logs contain that marker. See DOCS/OPERATIONS.md.

  - name: Token Health Monitor
    scripts:
      - token-monitor.sh
    github:
      workflow_file: token-health.yml
      schedule: "0 9 * * 1"
    gitlab:
      job: token-health
      cadence: weekly
    env_vars:
      - GH_TOKEN
    notes: >
      GitLab job additionally checks GITLAB_TOKEN expiry inline (not via script).

  - name: Cleanup Stale Branches
    scripts:
      - cleanup-branches.sh
    github:
      workflow_file: cleanup-branches.yml
      schedule: "0 4 1 * *"
    gitlab:
      job: cleanup-branches
      cadence: weekly
    env_vars:
      - GH_TOKEN
      - GITHUB_OWNER

  - name: Sync from GitLab
    scripts:
      - sync-from-gitlab.sh
      - git-platform-sync.sh
    github:
      workflow_file: git-platform-sync.yml
      schedule: "22 4 * * *"
    gitlab:
      job: sync-from-gitlab
      cadence: push
    env_vars:
      - GH_TOKEN
      - GITLAB_TOKEN
      - GITHUB_OWNER
    notes: >
      GitLab triggers on push (primary); GitHub runs daily as fallback.
      GitLab uses GH_SYNC_TOKEN mapped to GH_TOKEN — different secret name.
      sync-from-gitlab.yml is a deprecated stub; git-platform-sync.yml (direction=pull) is the active workflow.

  - name: Notification Poller
    scripts:
      - scan-rate-limit-failures.sh
      - rerun-after-rate-limit.sh
    github:
      workflow_file: notify-poller.yml
      schedule: "*/15 * * * *"
    gitlab:
      job: notify-poller
      cadence: poller
    env_vars:
      - WORKFLOW_SECRET
    notes: >
      Polls GitHub notifications API for CI activity. On GitHub, dispatches
      resolve-failures.yml directly. On GitLab, triggers the GitHub resolver
      via the API. Both sides share the same polling logic.

  - name: GitLab Critical Deploy
    scripts:
      - critical-deploy-gitlab.sh
    github:
      workflow_file: critical-deploy-gitlab.yml
      schedule: null
    gitlab:
      job: critical-deploy-gitlab
      cadence: manual
    env_vars:
      - GITLAB_TOKEN
      - GITLAB_MAINTENANCE_TOKEN
    notes: >
      Fast-lane recovery for the GitLab mirror. GitHub side is the primary
      entry point (workflow_dispatch). GitLab side is triggered via pipeline
      trigger token (CRITICAL_DEPLOY_GITLAB=true) or manually via the web UI.

# ── GitHub-only jobs ──────────────────────────────────────────────────────────
# These workflows have no GitLab CI counterpart. Intentional — they either
# operate on GitHub-specific APIs, are GitHub-to-GitLab push operations, or
# are interactive tools not suited to scheduled CI.

