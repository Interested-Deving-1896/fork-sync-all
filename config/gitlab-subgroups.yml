# config/gitlab-subgroups.yml
#
# Single source of truth for the GitLab subgroup structure under
# gitlab.com/openos-project.
#
# Used by:
#   scripts/mirror-osp-to-gitlab.sh  — determines where to create/push each repo
#   scripts/reconcile-org-refs.sh    — determines the GitLab URL to rewrite to
#
# Structure:
#   Each top-level key is a subgroup name (the path segment after openos-project/).
#   The id field is the GitLab namespace ID (used by the Projects API).
#   repos lists the GitHub repo names that belong to this subgroup.
#
# Fallback: any repo not listed here is placed in the 'ops' subgroup.
#
# To add a repo: append its GitHub name to the appropriate subgroup's repos list.
# To move a repo: move the name to the new subgroup — both scripts will pick it up.
# To add a subgroup: add a new top-level entry with a fresh GitLab namespace id.

subgroups:

  git-management_deving:
    id: 130516820
    path: openos-project/git-management_deving
    repos:
      - gitlab-enhanced
      - github-codeowners
