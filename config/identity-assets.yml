# config/identity-assets.yml — Identity asset reconcile configuration
#
# Maps each deployment ID (from config/fsa-deployments.yml) to a brand
# variant directory under assets/brand/. The reconcile script reads this
# file to determine which variant to activate on the current instance.
#
# Fields:
#   deployment_id   — must match an id in config/fsa-deployments.yml
#   variant         — subdirectory under assets/brand/ containing the assets
#   display_name    — human-readable name for this instance (used in cover page)
#   org_github      — GitHub org slug for this instance (used in cover page links)
#   org_gitlab      — GitLab group slug (empty if no GitLab counterpart)
#   docs_url        — public docs URL for this instance's GitHub Pages
#   badge_color     — hex color for instance-specific badges (without #)

variants:

  - deployment_id: source
    variant: source
    display_name: "Interested-Deving-1896"
    org_github: "Interested-Deving-1896"
    org_gitlab: ""
    docs_url: "https://interested-deving-1896.github.io/fork-sync-all/"
    badge_color: "0033cc"
    theme:
      primary: "#0033cc"
      primary_light: "#3366ff"
      primary_dark: "#001a80"
      accent: "#cc0000"
      accent_light: "#ff3333"
      cyan: "#00aacc"
      cyan_light: "#33ccee"
    book_toml:
      site_url: "/fork-sync-all/"
      repo_url: "https://github.com/Interested-Deving-1896/fork-sync-all"
      edit_url_template: "https://github.com/Interested-Deving-1896/fork-sync-all/edit/main/{path}"

