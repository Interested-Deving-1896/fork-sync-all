# ── Reconcile targets ─────────────────────────────────────────────────────────
# Files the reconcile script copies from the variant dir to .active/.
# Add entries here when new asset types are introduced.
# source_file: filename within assets/brand/<variant>/
# required: false means the script warns but does not fail if the file is absent

asset_files:
  - source_file: "logo.svg"
    required: false
  - source_file: "logo.png"
    required: false
  - source_file: "logo-dark.svg"
    required: false
  - source_file: "logo-dark.png"
    required: false
  - source_file: "cover-title.md"
    required: true

# ── Cover page injection ──────────────────────────────────────────────────────
# Marker pairs in DOCS/cover.md that the reconcile script fills in.
# The script replaces everything between START and END markers with the
# rendered content for the active variant.

cover_markers:
  - marker: "FSA-IDENTITY-TITLE"
    source: "cover-title.md"
    description: "Cover page title block (h1 + tagline + description)"
  - marker: "FSA-IDENTITY-LOGO"
    source: "logo.svg"
    description: "Logo image tag (omitted if logo.svg is absent)"
  - marker: "FSA-IDENTITY-BADGE-EXTRA"
    source: "cover-badge-extra.md"
    description: "Extra instance-specific badges (optional, omitted if absent)"
