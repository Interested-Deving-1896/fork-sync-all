    badge_color: "006600"
    theme:
      primary: "#006600"
      primary_light: "#009900"
      primary_dark: "#003300"
      accent: "#cc6600"
      accent_light: "#ff9900"
      cyan: "#006666"
      cyan_light: "#009999"
    book_toml:
      site_url: "/ops/fork-sync-all/"
      repo_url: "https://github.com/OpenOS-Project-OSP/fork-sync-all"
      edit_url_template: "https://github.com/OpenOS-Project-OSP/fork-sync-all/edit/main/{path}"

