# ── Platform API Hub ──────────────────────────────────────────────────────────
#
# Secrets required for cross-platform verification lookups.
# Set these as GitHub Actions secrets on the fork-sync-all repo.
#
# Secret name          Platform      Used for
# ─────────────────────────────────────────────────────────────────────────────
# SYNC_TOKEN           GitHub        All GitHub API calls (already configured)
# GITLAB_SYNC_TOKEN    GitLab        GitLab API calls (already configured)
# CODEBERG_TOKEN       Codeberg      Future: Codeberg API lookups
# FORGEJO_TOKEN        Forgejo       Future: Forgejo instance API lookups
#
# The onboarding workflow auto-detects which secrets are available and
# skips verification steps for platforms with no token configured.

platform_api:
  github:
    api_base: https://api.github.com
    token_secret: SYNC_TOKEN
    profile_url_template: "https://github.com/{handle}"
    org_url_template: "https://github.com/{handle}"
    bio_field: bio
    marker_repo: .vouch-fsa
  gitlab:
    api_base: https://gitlab.com/api/v4
    token_secret: GITLAB_SYNC_TOKEN
    profile_url_template: "https://gitlab.com/{handle}"
    group_url_template: "https://gitlab.com/{handle}"
    bio_field: bio
    marker_repo: .vouch-fsa
  codeberg:
    api_base: https://codeberg.org/api/v1
    token_secret: CODEBERG_TOKEN
    profile_url_template: "https://codeberg.org/{handle}"
    bio_field: description
    marker_repo: .vouch-fsa
    enabled: false  # enable when CODEBERG_TOKEN is configured

# ── Verification marker spec ──────────────────────────────────────────────────
#
# For self-service Tier 3 onboarding, users prove platform ownership by one
# or more of these methods (hybrid — any single method is sufficient):
#
#   bio-marker:   Add the string "vouch:fsa:{github_handle}" anywhere in
#                 your GitHub/GitLab bio.
#
#   repo-marker:  Create a file named .vouch-fsa in any public repo you own,
#                 containing: "vouch:fsa:{github_handle}"
#
#   cross-link:   Your GitHub profile links to your GitLab profile URL and
#                 vice versa (auto-detected).
#
#   org-member:   You are a public member of a Tier 2 org (auto-detected).
#
# The onboarding workflow checks all methods in order and records which
# succeeded in the verification field.

verification_marker_prefix: "vouch:fsa:"
