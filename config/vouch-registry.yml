# config/vouch-registry.yml
#
# Single source of truth for the FSA vouch/trust registry.
#
# Used by:
#   scripts/vouch-registry.sh     — read/write helpers, VOUCHED.td sync
#   scripts/vouch-onboard.sh      — onboarding logic
#   .github/workflows/vouch-onboard.yml
#   .github/workflows/vouch-check-pr.yml (via VOUCHED.td sync)
#
# Tiers:
#   1  CREATOR    — Original creator/developer/maintainer. Full PR trust,
#                   full workflow dispatch, never auto-cancelled.
#   2  ORG        — Trusted organizations and projects. Full PR trust,
#                   scoped workflow dispatch (auto-detected from registry).
#   3  CONTRIBUTOR — Trusted individual contributors within orgs/projects.
#                   Non-sensitive PR paths auto-pass; sensitive paths need
#                   review. No workflow dispatch by default.
#
# Entry fields:
#   handle        — canonical identifier (used in VOUCHED.td)
#   tier          — 1 | 2 | 3
#   type          — individual | org | project
#   role          — human-readable role description
#   active        — true | false (false = suspended, not deleted)
#   added_by      — handle of the Tier 1 entity that added this entry
#   added_at      — ISO 8601 date
#   platforms     — map of platform → handle(s). Lists allowed for multi-account.
#   url           — canonical profile/org URL
#   verification  — how platform links were verified (see below)
#   dispatch      — workflow dispatch permissions (auto-populated for Tier 2)
#   notes         — optional free-text
#
# Verification methods (hybrid — multiple can apply):
#   declaration   — trust-on-declaration (Tier 1/2 default)
#   bio-marker    — marker string found in GitHub/GitLab bio
#   repo-marker   — .vouch-fsa file found in a repo they control
#   cross-link    — GitHub and GitLab profiles link to each other
#   org-member    — confirmed via org membership API
#   admin         — manually verified by Tier 1 maintainer
#
# Platform keys:
#   github        — GitHub username or org slug
#   gitlab        — GitLab username or group path (list for multiple)
#   codeberg      — Codeberg username
#   forgejo       — Forgejo instance + username (format: "instance:username")
#   web           — personal/project website URL

# ── Tier 1: Original Creator / Developer / Maintainer ────────────────────────

