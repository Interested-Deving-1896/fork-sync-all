# bdfs-bootc.conf — default configuration for the bootc integration
#
# Copy to /etc/bdfs/bootc.conf or ~/.config/bdfs/bootc.conf and adjust.
# All values can be overridden per-invocation with CLI flags.

# Default OCI image reference for switch/commit operations.
# Example: quay.io/myorg/myos:stable
BDFS_BOOTC_IMAGE=

# Default registry prefix prepended to short image names.
# Example: quay.io/myorg  →  quay.io/myorg/<name>:tag
BDFS_BOOTC_REGISTRY=

# DwarFS compression algorithm used by bdfs-bootc export.
# Options: zstd (default, best ratio), lz4 (fastest), none
BDFS_BOOTC_COMPRESSION=zstd
