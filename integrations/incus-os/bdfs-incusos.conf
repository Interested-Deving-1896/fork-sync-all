# bdfs-incusos.conf — default configuration for the IncusOS integration
#
# Copy to /etc/bdfs/incusos.conf or ~/.config/bdfs/incusos.conf and adjust.
# All values can be overridden per-invocation with CLI flags.

# Path to the IncusOS root filesystem.
# On a live IncusOS system this is /. For offline analysis, point to a
# mounted IncusOS image or extracted rootfs.
BDFS_INCUSOS_ROOT=/

# Directory where exported DwarFS images are stored.
BDFS_INCUSOS_IMAGES=/var/lib/bdfs/incusos-images

# DwarFS compression algorithm used by bdfs-incusos export.
# Options: zstd (default, best ratio), lz4 (fastest), none
BDFS_INCUSOS_COMPRESSION=zstd
