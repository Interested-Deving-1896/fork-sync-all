# bdfs-ostree.conf — default configuration for the OSTree integration
#
# Copy to /etc/bdfs/ostree.conf or ~/.config/bdfs/ostree.conf and adjust.
# All values can be overridden per-invocation with CLI flags.

# Path to the OSTree repository.
# For system deployments this is typically /ostree/repo.
# For user repos created with `ostree init`, use the repo path directly.
BDFS_OSTREE_REPO=/ostree/repo

# Default branch to commit/publish to.
# Convention: use <project>/<channel>, e.g. myos/stable or myos/dev.
BDFS_OSTREE_BRANCH=bdfs/main

# Number of deployments to keep when pruning.
# Older deployments beyond this count are removed.
BDFS_OSTREE_KEEP=3

# DwarFS compression algorithm used by bdfs-ostree export.
# Options: zstd (default, best ratio), lz4 (fastest), none
BDFS_OSTREE_COMPRESSION=zstd
