# bdfs-devcontainer.conf — default configuration for the Dev Container integration
#
# Copy to /etc/bdfs/devcontainer.conf or ~/.config/bdfs/devcontainer.conf and adjust.
# All values can be overridden per-invocation with CLI flags.

# Default workspace folder passed to devcontainer CLI commands.
# Typically the root of the project containing .devcontainer/.
BDFS_DC_WORKSPACE_FOLDER=

# Directory where exported DwarFS images are stored.
BDFS_DC_IMAGE_STORE=/var/lib/bdfs/devcontainer-images

# DwarFS compression algorithm used by bdfs-devcontainer export/build --pack.
# Options: zstd (default, best ratio), lz4 (fastest), none
BDFS_DC_COMPRESSION=zstd

# Container runtime to use. Auto-detected (docker preferred, podman fallback).
# Set explicitly if both are installed and you want to force one.
# DOCKER_CMD=podman
