services:
  incusd:
    name: Incus Daemon
    description: >
      Incus container/VM daemon (incusd). Required for running OCI images,
      system containers, and VMs via Incus. Requires CAP_SYS_ADMIN +
      CAP_NET_ADMIN — only functional on privileged runners. On standard
      Ona Cloud runners this service will fail to start; use a self-hosted
      runner with nested virtualization enabled.
      On first start, runs 'incus admin init --auto' to initialize storage
      and networking.
    commands:
      start: |
        if ! capsh --print 2>/dev/null | grep -q "cap_sys_admin"; then
          echo "[incusd] CAP_SYS_ADMIN not available — daemon cannot start on this runner" >&2
          exit 1
        fi
        incusd --group incus-admin &
        sleep 3
        if ! incus info &>/dev/null; then
          echo "[incusd] daemon did not start" >&2
          exit 1
        fi
        if ! incus profile list &>/dev/null 2>&1 || ! incus storage list &>/dev/null 2>&1; then
          echo "[incusd] Initializing Incus (first run)..." >&2
          incus admin init --auto
        fi
        wait
      ready: incus info
    triggeredBy:
      - manual

  bugzilla-mcp-server:
    name: Bugzilla MCP Server
    description: >
      MCP server for Bugzilla integration (openSUSE/mcp-bugzilla via Docker Hub).
      Exposes bug_info, bug_comments, add_comment, create_bug, update_bug_status,
      bugs_quicksearch, and more as MCP tools on port 8000 (HTTP transport).
      Any MCP-compatible agent can connect to http://localhost:8000/mcp/.

      Requires BZ_URL and BZ_API_KEY environment variables (set as Ona secrets).
      No-ops gracefully if BZ_URL is unset — the container exits immediately.

      API key is passed per-request via the ApiKey header (not at startup),
      so agents must include: -H "ApiKey: $BZ_API_KEY" in MCP client config.

      Docs: https://github.com/openSUSE/mcp-bugzilla
    commands:
      start: >
        if [[ -z "${BZ_URL:-}" ]]; then
          echo "[bugzilla-mcp] BZ_URL not set — Bugzilla MCP server not started.";
          echo "[bugzilla-mcp] Run onboard-bugzilla.yml and set BZ_URL + BZ_API_KEY secrets first.";
          sleep infinity;
        else
          docker run --rm --name bugzilla-mcp -p 8000:8000
          -e BUGZILLA_SERVER="${BZ_URL}"
          kskarthik/mcp-bugzilla
          --bugzilla-server "${BZ_URL}"
          --host 0.0.0.0
          --port 8000;
        fi
      stop: docker stop bugzilla-mcp 2>/dev/null || true
      ready: "curl -sf http://localhost:8000/mcp/ -H 'Content-Type: application/json' -d '{}' | grep -q 'jsonrpc\\|error' || curl -sf http://localhost:8000/"
    triggeredBy:
      - manual

  ona-mcp-server:
    name: Ona Projects MCP Server
    description: >
      AI-agent-agnostic MCP server for Ona project operations. Exposes
      list_projects, get_project, create_environment, sync_projects, and
      get_config_summary as MCP tools on port 8788 (SSE transport).
      Any MCP-compatible agent can connect to http://localhost:8788/sse.
      Runs in read-only mode until ONA_TOKEN is set.
    commands:
      start: python3 scripts/ona-mcp-server.py
      ready: curl -sf http://localhost:8788/sse || curl -sf http://localhost:8788/
    triggeredBy:
      - postDevcontainerStart

  headroom-proxy:
    name: Headroom Proxy
    description: >
      Context compression proxy for AI agents. Sits on port 8787 and compresses
      tool outputs, logs, and conversation history before they reach the LLM.
      Reduces token consumption by 60-95% on typical agent workloads.
      Use with: ANTHROPIC_BASE_URL=http://localhost:8787 or headroom wrap claude.
    commands:
      start: headroom proxy --port 8787 --no-ccr-inject-tool
      ready: for i in $(seq 1 15); do curl -sf http://localhost:8787/livez && exit 0; sleep 2; done; exit 1
    triggeredBy:
      - postDevcontainerStart

  sync-in-server:
    name: Sync-in Server
    description: >
      Local Sync-in server instance (syncin/server from Docker Hub) running
      via Incus OCI. Provides file sync and workspace collaboration.
      When running, the sync-in.yml workflow can reach it at
      http://localhost:3284 (set SYNC_IN_SERVER_URL=http://localhost:3284).
      Admin token is cached at ~/.local/share/sync-in/.admin_token on first
      start. Requires the 'incusd' service to be running first.
    commands:
      start: bash services/sync-in/start.sh
      ready: curl -sf http://localhost:3284/api/v1/health
    triggeredBy:
      - manual

  fsa-api:
    name: FSA API
    description: >
      FSA control-plane HTTP API on port 8090. Exposes 29 routes across
      workflows, repos, notifications, quota, chain, deployments, codebase,
      docs, and toggles domains. Requires GH_TOKEN (SYNC_TOKEN) and
      shell2http (installed automatically on first start).
      Health check: curl http://localhost:8090/health
      Docs: DOCS/fsa-api-deployment.md
    commands:
      start: |
        export PATH="$HOME/go/bin:$PATH"
        export GH_TOKEN="${SYNC_TOKEN:-${GH_TOKEN:-}}"
        export FSA_AUTH="${FSA_AUTH:-}"
        export FSA_ORG="Interested-Deving-1896"
        export FSA_REPO="fork-sync-all"
        exec fsa-api/server/fsa-start.sh --port 8090
      ready: curl -sf http://localhost:8090/health
    triggeredBy:
      - manual

tasks:
  security-scan:
    name: Security Scan
    description: >
      Runs dev-machine-guard to scan the devcontainer environment for
      suspicious packages, AI agents, MCP servers, IDE extensions, and
      background processes. Results are printed to stdout as JSON.
      Non-fatal: exits 0 even when findings are present so the devcontainer
      starts normally. Set BLOCK_ON_FINDINGS=true to exit 1 on critical findings.
    command: bash fsa-api/core/adapters/security/scan.sh
    triggeredBy:
      - postDevcontainerStart
      - manual

  install-security-tools:
    name: Install Security Tools
    description: >
      Installs dev-machine-guard (StepSecurity) and ratchet (sethvargo/ratchet)
      into ~/.local/bin. Safe to re-run — skips tools already installed.
      Called automatically by postCreateCommand in devcontainer.json.
    command: bash .devcontainer/install-security-tools.sh
    triggeredBy:
      - manual

  install-sync-in:
    name: Install Sync-in Server
    description: >
      Attempts to install the sync-in-server binary to ~/.local/bin.
      NOTE: Sync-in/server only ships Docker images — this task will
      succeed only if a binary release becomes available at
      github.com/Sync-in/server/releases. Set FORCE=true to retry.
    command: bash services/sync-in/install.sh
    triggeredBy:
      - manual
