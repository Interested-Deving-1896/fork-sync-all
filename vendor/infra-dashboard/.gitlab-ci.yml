# GitLab CI for infra-dashboard
# Builds public-dashboard and deploys to GitLab Pages.
# GitLab Pages URL: https://openos-project.gitlab.io/ops/infra-dashboard/

stages:
  - build
  - deploy

variables:
  BUN_VERSION: "latest"
  NODE_ENV: "production"

# ── Build ──────────────────────────────────────────────────────────────────────

build:public-dashboard:
  stage: build
  image: oven/bun:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - public-dashboard/**/*
        - .gitlab-ci.yml
    - if: $CI_PIPELINE_SOURCE == "web"
  variables:
    VITE_APP_NAME: "${VITE_APP_NAME:-OSP Dashboard}"
    VITE_APP_VERSION: "$CI_COMMIT_SHORT_SHA"
    VITE_ENDPOINT_URL: "${VITE_ENDPOINT_URL:-https://api.openos-project.org/api}"
    VITE_PRIMARY_MIRROR_URL: "${VITE_PRIMARY_MIRROR_URL:-https://mirror.openos-project.org/repo}"
  script:
    - cd public-dashboard
    - bun install --frozen-lockfile
    - bun run build:pages
    # GitLab Pages requires output in /public at repo root
    - mkdir -p ../public
    - cp -r dist/* ../public/
  artifacts:
    expire_in: 1 hour
    paths:
      - public/

# ── Deploy ─────────────────────────────────────────────────────────────────────

pages:
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - public-dashboard/**/*
        - .gitlab-ci.yml
    - if: $CI_PIPELINE_SOURCE == "web"
  dependencies:
    - build:public-dashboard
  script:
    - echo "Deploying to GitLab Pages from public/"
    - ls -la public/
  artifacts:
    paths:
      - public/
  environment:
    name: gitlab-pages
    url: https://openos-project.gitlab.io/ops/infra-dashboard/
