name: Post-Flush Verification

# End-to-end verification after a full-chain-flush completes. Runs four checks:
#
#   1. Mirror integrity — SHA comparison across all three mirror pairs
#   2. CI status       — checks GitHub CI on I-D-1896 OSP-bound repos
#   3. Quota health    — reports remaining quota after the flush
#   4. Queue health    — checks for stuck/elevated workflow queues
#
# Called by full-chain-flush.yml as the final stage (stage 14) via workflow_call.
# Also fires automatically after a standalone Full Chain Flush via workflow_run,
# and can be run manually after any ad-hoc mirror operation.

on:
  workflow_run:
    workflows:
      - "Full Chain Flush"
    types: [completed]
  workflow_dispatch:
    inputs:
      repo_filter:
        description: "Check only repos matching this substring (blank = all)"
        required: false
        default: ""
        type: string
      block_on_failure:
        description: "Fail this workflow if critical checks fail"
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      repo_filter:
        type: string
        default: ""
      block_on_failure:
        type: boolean
        default: false

permissions:
  actions: read
  contents: read

concurrency:
  group: post-flush-prep
  cancel-in-progress: true

jobs:
  verify:
    name: Post-Flush Verification
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_call' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
      GITLAB_TOKEN: ${{ secrets.GITLAB_SYNC_TOKEN }}
      REPO: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Quota pre-flight
        id: quota
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          MIN_QUOTA: "300"
          QUOTA_WRITE_VAR: "true"
          QUOTA_REPO: ${{ github.repository }}
        run: |
          source scripts/includes/quota-snapshot.sh
          quota_snapshot

      - name: Run post-flush verification
        if: steps.quota.outputs.skip == 'false'
        env:
          REPO_FILTER: ${{ inputs.repo_filter || '' }}
          BLOCK_ON_FAILURE: ${{ inputs.block_on_failure || 'false' }}
          BUDGET_MINUTES: "50"
          MIN_QUOTA: "300"
        run: |
          source scripts/includes/quota-instrument.sh
          qi_begin
          bash scripts/post-flush-prep.sh
          qi_end

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
