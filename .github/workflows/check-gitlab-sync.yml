name: Check GitLab CI Sync

# Compares paired jobs in .gitlab-ci.yml against config/workflow-sync.yml
# and reports any drift — scripts that have changed entry points, cadence
# rules that no longer match, or jobs missing from either side.
#
# Informational only: never auto-applies changes. Output appears in the
# job summary for human review.
#
# Run this after editing .gitlab-ci.yml, config/workflow-sync.yml, or any
# paired workflow file to confirm the two platforms are still in sync.
#
# Triggers:
#   workflow_dispatch — manual: optionally fail on drift.
#   workflow_run      — automatic: fires after Validate Config completes so
#                       any workflow file change is immediately cross-checked
#                       against the GitLab CI counterpart. Runs report-only
#                       (fail_on_drift=false) to avoid blocking the push.

on:
  workflow_run:
    workflows:
      - "Validate Config"
    types: [completed]
  workflow_dispatch:
    inputs:
      fail_on_drift:
        description: "Exit non-zero if drift is detected (default: report only)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read

concurrency:
  group: check-gitlab-sync
  cancel-in-progress: true

jobs:
  check-sync:
    name: Check GitHub ↔ GitLab job sync
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Check paired job drift
        env:
          # workflow_run: always report-only — don't fail the push pipeline
          FAIL_ON_DRIFT: ${{ github.event_name == 'workflow_run' && 'false' || inputs.fail_on_drift || 'false' }}
        run: |
          if [[ "$FAIL_ON_DRIFT" == "true" ]]; then
            python3 scripts/generate-gitlab-stubs.py --check
          else
            python3 scripts/generate-gitlab-stubs.py
          fi

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
