name: Deploy Book

# Builds the mdBook documentation site from DOCS/ and deploys to GitHub Pages.
#
# Pages URL: https://interested-deving-1896.github.io/fork-sync-all/
#
# One-time setup required:
#   Settings → Pages → Source → GitHub Actions
#
# mdBook is installed via cargo with a cached ~/.cargo to avoid rebuilding
# on every run. Cache key includes the mdBook version so upgrades are picked
# up automatically when the version pin changes.

on:
  push:
    branches: [main]
    paths:
      - 'DOCS/**'
      - 'book.toml'
      - 'README.md'
      - 'AGENTS.md'
      - 'assets/brand/**'
      - 'config/identity-assets.yml'
      - 'vendor/book-engine/themes/**'
      - '.github/workflows/deploy-book.yml'
  workflow_dispatch:

concurrency:
  group: deploy-book
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  MDBOOK_VERSION: "0.4.40"

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: Build book
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7

      - name: Cache cargo
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # ratchet:actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/mdbook
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: mdbook-${{ env.MDBOOK_VERSION }}

      - name: Install mdBook
        run: |
          if ! command -v mdbook &>/dev/null || [[ "$(mdbook --version)" != *"$MDBOOK_VERSION"* ]]; then
            cargo install mdbook --version "$MDBOOK_VERSION" --locked
          else
            echo "mdbook $MDBOOK_VERSION already cached"
          fi

      - name: Stage root docs into DOCS/
        run: |
          cp README.md DOCS/README.md
          cp AGENTS.md DOCS/AGENTS.md
          # DOCS/workflow-triggers.md is committed and kept in sync by
          # update-workflow-triggers-doc.yml — no copy needed here.

      - name: Reconcile identity assets
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: bash scripts/reconcile-identity-assets.sh

      - name: Patch book.toml for this instance
        run: |
          ACTIVE="assets/brand/.active"
          PATCH="${ACTIVE}/book-toml-patch.py"
          OVERRIDE_CSS="${ACTIVE}/theme-override.css"
          if [[ -f "$PATCH" ]]; then
            # Pass relative path so mdBook can find the CSS from repo root
            python3 "$PATCH" book.toml \
              "" "" "" \
              "${OVERRIDE_CSS}"
          fi

      - name: Build
        run: mdbook build

      - name: Restore book.toml
        if: always()
        run: git checkout -- book.toml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # ratchet:actions/upload-pages-artifact@v5
        with:
          path: book

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7
        with:
          sparse-checkout: |
            scripts/write-summary.sh
          sparse-checkout-cone-mode: false
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # ratchet:actions/deploy-pages@v5
      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
