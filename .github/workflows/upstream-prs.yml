name: Upstream PRs from OSP + OOC

on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write  # Changed to write to allow token usage for creating PRs
  pull-requests: write
  id-token: write  # Added permission for id-token
  actions: read    # Added permission for actions to ensure proper access
  checks: write    # Added permission for checks to ensure proper access

jobs:
  upstream-prs:
    name: Upstream PRs → Interested-Deving-1896
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upstream open PRs from OSP and OOC
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          UPSTREAM_OWNER: Interested-Deving-1896
          MIRROR_ORGS: "OpenOS-Project-OSP OpenOS-Project-Ecosystem-OOC"
        run: bash scripts/upstream-prs.sh
