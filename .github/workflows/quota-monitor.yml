name: Quota Monitor

# Monitors GitHub core rate limit quota and optionally dispatches a target
# workflow once quota recovers above a configurable threshold.
#
# Poll interval is recalculated on every iteration from the live reset epoch
# returned by the API — so if the reset slides (because another workflow fires
# and exhausts quota again), the sleep tightens or widens automatically.
#
# Two modes:
#
#   monitor-only  — poll and log quota state; exit 0 when quota recovers.
#                   Useful for diagnosing quota exhaustion patterns.
#
#   wait-trigger  — same as above, but dispatch target_workflow when quota
#                   recovers. Replaces the old quota-wait-trigger workflow.
#
# Triggers:
#   workflow_dispatch — manual: full control over mode, target, and timeout.
#   workflow_run      — automatic: fires after Rate-Limit Re-trigger completes.
#                       Runs in monitor-only mode (no dispatch target) with a
#                       short 30-minute timeout. If quota is already healthy the
#                       workflow exits immediately after the first poll.
#
# No scheduled trigger — running on a schedule while quota is exhausted burns
# the first calls of each new hour, sliding the reset window forward.

on:
  workflow_run:
    workflows:
      - "Rate-Limit Re-trigger"
    types: [completed]
  workflow_dispatch:
    inputs:
      target_workflow:
        description: "Workflow to dispatch when quota recovers (leave blank for monitor-only)"
        required: false
        type: string
        default: ""

      target_inputs:
        description: "JSON object of inputs for the target workflow"
        required: false
        type: string
        default: "{}"

      target_ref:
        description: "Git ref to dispatch the target workflow on"
        required: false
        type: string
        default: "main"

      min_quota:
        description: "Minimum core API calls remaining before dispatching"
        required: false
        type: string
        default: "2000"

      buffer_sec:
        description: "Extra seconds to wait after the reset epoch"
        required: false
        type: string
        default: "45"

      timeout_min:
        description: "Give up after this many minutes (max 170 due to runner limit)"
        required: false
        type: string
        default: "170"

      dry_run:
        description: "Poll and report without dispatching"
        required: false
        type: boolean
        default: false

      mode:
        description: "quota — wait for quota recovery; watch — wait for a workflow run to reach a status"
        required: false
        type: choice
        options:
          - quota
          - watch
        default: quota

      watch_workflow:
        description: "[watch] Workflow filename to watch (e.g. sync-template.yml)"
        required: false
        type: string
        default: ""

      watch_until:
        description: "[watch] Exit when run reaches this status"
        required: false
        type: choice
        options:
          - completed
          - in_progress
        default: completed

      watch_timeout_min:
        description: "[watch] Expected max runtime of the watched workflow (drives adaptive poll interval)"
        required: false
        type: string
        default: "60"

concurrency:
  group: quota-monitor
  cancel-in-progress: true   # A newer run supersedes an in-flight monitor

permissions:
  actions: write   # needed to dispatch the target workflow
  contents: read

jobs:
  monitor:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 175   # 170m user timeout + 5m setup/teardown buffer
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Monitor quota / watch run
        env:
          GH_TOKEN:             ${{ secrets.SYNC_TOKEN }}
          GITHUB_OWNER:         Interested-Deving-1896
          GITHUB_REPO:          fork-sync-all
          # When triggered automatically via workflow_run, run monitor-only
          # with a short timeout — no dispatch target, just log quota state.
          MODE:                 ${{ github.event_name == 'workflow_run' && 'quota' || inputs.mode || 'quota' }}
          # quota mode
          TARGET_WORKFLOW:      ${{ github.event_name == 'workflow_run' && '' || inputs.target_workflow || '' }}
          TARGET_INPUTS:        ${{ inputs.target_inputs || '{}' }}
          TARGET_REF:           ${{ inputs.target_ref || 'main' }}
          MIN_QUOTA:            ${{ inputs.min_quota || '2000' }}
          BUFFER_SEC:           ${{ inputs.buffer_sec || '45' }}
          MIN_POLL_SEC:         "30"
          MAX_POLL_SEC:         "300"
          TIMEOUT_MIN:          ${{ github.event_name == 'workflow_run' && '30' || inputs.timeout_min || '170' }}
          DRY_RUN:              ${{ inputs.dry_run || 'false' }}
          # watch mode
          WATCH_WORKFLOW:       ${{ inputs.watch_workflow || '' }}
          WATCH_UNTIL:          ${{ inputs.watch_until || 'completed' }}
          WATCH_TIMEOUT_MIN:    ${{ inputs.watch_timeout_min || '60' }}
        run: bash scripts/quota-monitor.sh

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
