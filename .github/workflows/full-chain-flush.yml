name: Full Chain Flush

# Runs the complete mirror + README + CI pipeline in dependency order,
# waiting for each stage to finish before starting the next.
#
# Stage order (clean I-D-1896 first, mirror outward, GitLab last, publish after):
#   1.   Sync all forks
#   2.   Sync registered imports
#   2b.  Sync FSA forks                  (fork-sync-all downstream forks)
#   2c.  Sync UAA vendor
#   2d.  Sync shell tools vendor
#   2e.  Integrate shell tools
#   3a.  Create missing READMEs
#   3b.  Update READMEs
#   3c.  Validate README render
#   3d.  Inject badges
#   3e.  LTS README standardisation (OSP repos)
#   3f.  Inject repo motto
#   3g.  Generate repo descriptions
#   3h.  Translate READMEs
#   3i.  Sync template to consumers
#   3j.  Pin manager (versions, profile, issues)
#   4.   Reconcile org refs in I-D-1896  (pre-mirror cleanup)
#   5.   Pre-mirror CI gate              (block if OSP-bound repos are red)
#   6.   Mirror I-D-1896 -> OSP
#   7.   Verify mirror integrity         (id-1896-to-osp SHA check)
#   8.   Reconcile org refs in OSP       (post-mirror-to-OSP)
#   9.   Mirror OSP -> OOC
#   10.  Verify mirror integrity         (osp-to-ooc SHA check)
#   11.  Reconcile org refs in OOC       (post-mirror-to-OOC)
#   12.  Check OSP-bound CI + trigger resolver
#   13.  Mirror OSP -> GitLab            (GitLab last)
#   14.  Verify mirror integrity         (osp-to-gitlab SHA check)
#   15.  Reconcile org refs in GitLab    (post-mirror-to-GitLab)
#   16.  Sync GitLab -> I-D-1896
#   17.  Reconcile org refs in I-D-1896  (post-GitLab-sync cleanup)
#   18.  Post-flush verification         (end-to-end health check)
#   19.  Deploy book
#   20.  Generate book pages
#   21.  Update book index
#   22.  Sync penguins-eggs docs to book
#   23.  Generate OSP dependency graph
#   24.  Generate SBOM
#   25.  bdfs package

on:
  schedule:
    - cron: '17 5 1 * *' # staggered off :00 boundary
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip the CI resolver in stage 9"
        required: false
        default: false
        type: boolean
      skip_readmes:
        description: "Skip README create/update/validate/badge steps"
        required: false
        default: false
        type: boolean
      managed_by_lifecycle:
        description: "Set true when dispatched by flush-lifecycle.yml — suppresses pipeline_guard_start/end so lifecycle owns FLUSH_ACTIVE exclusively"
        required: false
        default: false
        type: boolean

permissions:
  actions: write
  contents: read

concurrency:
  group: full-chain-flush
  cancel-in-progress: true

jobs:
  flush:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
      REPO: ${{ github.repository }}
      HAS_ACTIVITYSMITH: ${{ secrets.ACTIVITYSMITH_API_KEY != '' }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # ratchet:step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: false
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7

      # ── ActivitySmith Live Activity (opt-in: set ACTIVITYSMITH_API_KEY secret) ──
      - name: Quota pre-flight
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          MIN_QUOTA: "2000"
          QUOTA_WRITE_VAR: "true"
          QUOTA_REPO: ${{ github.repository }}
        run: |
          source scripts/includes/quota-snapshot.sh
          quota_snapshot
          # full-chain-flush hard-aborts on low quota — skip=true is not safe here
          skip=$(grep '^skip=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2)
          if [[ "$skip" == "true" ]]; then
            echo "Quota too low — aborting flush." >&2
            exit 1
          fi

      - name: "ActivitySmith: start Live Activity"
        id: activity
        if: ${{ env.HAS_ACTIVITYSMITH == 'true' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: start_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          channels: ${{ secrets.ACTIVITYSMITH_CHANNELS }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Starting pipeline"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 0
            action:
              title: "Open Run"
              type: "open_url"
              url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      # ── Pipeline guard: set FLUSH_ACTIVE + log quota ─────────────────────
      # Skipped when dispatched by flush-lifecycle.yml (managed_by_lifecycle=true)
      # so lifecycle owns FLUSH_ACTIVE exclusively and clears it on completion.
      - name: Pipeline guard start
        if: ${{ inputs.managed_by_lifecycle != true }}
        run: |
          source scripts/includes/pipeline-guard.sh
          pipeline_guard_start "Full Chain Flush"

      # ── Stage 1: Sync all forks ───────────────────────────────────────────
      - name: "Stage 1: Sync all forks"
        run: |
          bash scripts/dispatch-and-wait.sh sync-forks.yml 30
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 1 done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 1 done — Sync registered imports"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 1

      # ── Stage 2: Sync registered imports ─────────────────────────────────
      - name: "Stage 2: Sync registered imports"
        run: |
          bash scripts/dispatch-and-wait.sh sync-registered-imports.yml 30
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 2 done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 2 done — Sync FSA forks"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 2

      # ── Stage 2b: Sync fork-sync-all downstream forks ────────────────────
      - name: "Stage 2b: Sync FSA forks"
        run: |
          bash scripts/dispatch-and-wait.sh sync-fsa-forks.yml 20
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 2b done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 2b done — Sync UAA vendor"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 3

      # ── Stage 2c: Sync UAA vendor ─────────────────────────────────────────
      - name: "Stage 2c: Sync UAA vendor"
        run: |
          bash scripts/dispatch-and-wait.sh sync-uaa-vendor.yml 20
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 2c done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 2c done — Sync shell tools"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 12

      # ── Stage 2d: Sync + integrate shell tools ────────────────────────────
      - name: "Stage 2d: Sync shell tools vendor"
        run: |
          bash scripts/dispatch-and-wait.sh sync-shell-tools.yml 20
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "Stage 2e: Integrate shell tools"
        run: |
          bash scripts/dispatch-and-wait.sh integrate-shell-tools.yml 30
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 2d/2e done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 2e done — Create/Update READMEs"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 13

      # ── Stage 3: READMEs + badges + LTS ──────────────────────────────────
      - name: "Stage 3a: Create missing READMEs"
        if: ${{ inputs.skip_readmes != true }}
        run: |
          bash scripts/dispatch-and-wait.sh create-readmes.yml 90
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "Stage 3b: Update READMEs"
        if: ${{ inputs.skip_readmes != true }}
        run: |
          bash scripts/dispatch-and-wait.sh update-readmes.yml 90
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "Stage 3c: Validate README render"
        if: ${{ inputs.skip_readmes != true }}
        run: |
          bash scripts/dispatch-and-wait.sh validate-readme-render.yml 20
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "Stage 3d: Inject badges"
        if: ${{ inputs.skip_readmes != true }}
        run: |
          bash scripts/dispatch-and-wait.sh inject-badges.yml 20
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "Stage 3e: LTS README standardisation (OSP repos)"
        if: ${{ inputs.skip_readmes != true }}
        run: |
          bash scripts/dispatch-and-wait.sh lts-readmes.yml 120 '{"priority_only":"true","dry_run":"false","force":"false"}'
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      # ── Stage 3f–3j: Content enrichment (motto, descriptions, translate, template, pins) ──
      - name: "Stage 3f: Inject repo motto"
        run: |
          bash scripts/dispatch-and-wait.sh inject-motto.yml 30
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "Stage 3g: Generate repo descriptions"
        run: |
          bash scripts/dispatch-and-wait.sh generate-repo-descriptions.yml 30
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "Stage 3h: Translate READMEs"
        run: |
          bash scripts/dispatch-and-wait.sh translate-readmes.yml 60
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "Stage 3i: Sync template to consumers"
        run: |
          bash scripts/dispatch-and-wait.sh sync-template.yml 45
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "Stage 3j: Pin manager (versions, profile, issues)"
        run: |
          bash scripts/dispatch-and-wait.sh pin-manager.yml 30
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 3 done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 3 done — Reconcile I-D-1896"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 19

      # ── Stage 4: Reconcile I-D-1896 before mirroring out ─────────────────
      - name: "Stage 4: Reconcile org refs (I-D-1896 pre-mirror)"
        run: |
          bash scripts/dispatch-and-wait.sh reconcile-org-refs.yml 55 '{"dry_run":"false","orgs":"id-1896-only","repo_filter":"","force_reconcile":"false"}'
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 4 done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 4 done — Pre-mirror CI gate"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 12

      # ── Stage 5: Pre-mirror CI gate ───────────────────────────────────────
      - name: "Stage 5: Pre-mirror CI gate"
        if: ${{ inputs.dry_run != true }}
        run: |
          bash scripts/dispatch-and-wait.sh pre-mirror-ci-gate.yml 90 '{"dry_run":"false","repo_filter":"","block_on_fail":"true"}'
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 5 done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 5 done — Mirror I-D-1896 → OSP"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 13

      # ── Stage 6: Mirror I-D-1896 → OSP ───────────────────────────────────
      - name: "Stage 6: Mirror I-D-1896 -> OSP"
        run: |
          bash scripts/dispatch-and-wait.sh mirror-to-osp.yml 90
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 6 done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 6 done — Verify I-D-1896 → OSP integrity"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 14

      # ── Checkpoint 1: after GitHub mirror phase (stages 1–6) ─────────────
      # Pause/resume if quota is too low to continue into the GitLab mirror phase.
      - name: "Quota checkpoint (post-GitHub-mirror)"
        run: |
          source scripts/includes/pipeline-guard.sh
          pipeline_guard_checkpoint 800 "post-GitHub-mirror"

      # ── Stage 7: Verify I-D-1896 → OSP integrity ─────────────────────────
      - name: "Stage 7: Verify mirror integrity (id-1896-to-osp)"
        run: |
          bash scripts/dispatch-and-wait.sh verify-mirror-integrity.yml 45 '{"mirror_pair":"id-1896-to-osp","repo_filter":"","block_on_mismatch":"false"}'
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 7 done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 7 done — Reconcile OSP"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 15

      # ── Stage 8: Reconcile OSP after mirror ──────────────────────────────
      - name: "Stage 8: Reconcile org refs (OSP)"
        run: |
          bash scripts/dispatch-and-wait.sh reconcile-org-refs.yml 55 '{"dry_run":"false","orgs":"osp-only","repo_filter":"","force_reconcile":"false"}'
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 8 done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 8 done — Mirror OSP → OOC"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 16

      # ── Stage 9: Mirror OSP → OOC ─────────────────────────────────────────
      - name: "Stage 9: Mirror OSP -> OOC"
        run: |
          bash scripts/dispatch-and-wait.sh mirror-osp-to-ooc.yml 90
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 9 done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 9 done — Verify OSP → OOC integrity"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 17

      # ── Stage 10: Verify OSP → OOC integrity ─────────────────────────────
      - name: "Stage 10: Verify mirror integrity (osp-to-ooc)"
        run: |
          bash scripts/dispatch-and-wait.sh verify-mirror-integrity.yml 45 '{"mirror_pair":"osp-to-ooc","repo_filter":"","block_on_mismatch":"false"}'
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 10 done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 10 done — Reconcile OOC"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 18

      # ── Stage 11: Reconcile OOC after mirror ─────────────────────────────
      - name: "Stage 11: Reconcile org refs (OOC)"
        run: |
          bash scripts/dispatch-and-wait.sh reconcile-org-refs.yml 55 '{"dry_run":"false","orgs":"ooc-only","repo_filter":"","force_reconcile":"false"}'
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 11 done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 11 done — Check OSP CI"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 19

      # ── Stage 12: Check CI across all targets + trigger resolver ─────────
      - name: "Stage 12: Check CI status + trigger resolver"
        if: ${{ inputs.dry_run != true }}
        run: |
          bash scripts/dispatch-and-wait.sh check-ci.yml 90 '{"dry_run":"false","repo_filter":"","target_id":""}'
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 12 done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 12 done — Mirror OSP → GitLab"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 20

      # ── GitLab mirroring (last) ───────────────────────────────────────────

      # ── Stage 13: Mirror OSP → GitLab ────────────────────────────────────
      - name: "Stage 13: Mirror OSP -> GitLab"
        run: |
          bash scripts/dispatch-and-wait.sh mirror-osp-to-gitlab.yml 90
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 13 done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 13 done — Verify OSP → GitLab integrity"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 21

      # ── Checkpoint 2: after GitLab mirror phase (stages 7–13) ───────────
      # Pause/resume if quota is too low to continue into the post-mirror phase.
      - name: "Quota checkpoint (post-GitLab-mirror)"
        run: |
          source scripts/includes/pipeline-guard.sh
          pipeline_guard_checkpoint 500 "post-GitLab-mirror"

      # ── Stage 14: Verify OSP → GitLab integrity ──────────────────────────
      - name: "Stage 14: Verify mirror integrity (osp-to-gitlab)"
        run: |
          bash scripts/dispatch-and-wait.sh verify-mirror-integrity.yml 45 '{"mirror_pair":"osp-to-gitlab","repo_filter":"","block_on_mismatch":"false"}'
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 14 done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 14 done — Reconcile GitLab"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 22

      # ── Stage 15: Reconcile GitLab after mirror ───────────────────────────
      - name: "Stage 15: Reconcile org refs (GitLab)"
        run: |
          bash scripts/dispatch-and-wait.sh reconcile-org-refs.yml 55 '{"dry_run":"false","orgs":"gitlab-only","repo_filter":"","force_reconcile":"false"}'
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 15 done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 15 done — Sync GitLab → I-D-1896"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 23

      # ── Stage 16: Sync GitLab → I-D-1896 ─────────────────────────────────
      - name: "Stage 16: Sync GitLab -> I-D-1896"
        run: |
          bash scripts/dispatch-and-wait.sh sync-from-gitlab.yml 30
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 16 done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 16 done — Final reconcile I-D-1896"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 24

      # ── Stage 17: Final reconcile I-D-1896 after GitLab sync ─────────────
      - name: "Stage 17: Reconcile org refs (I-D-1896 post-GitLab sync)"
        run: |
          bash scripts/dispatch-and-wait.sh reconcile-org-refs.yml 55 '{"dry_run":"false","orgs":"id-1896-only","repo_filter":"","force_reconcile":"false"}'
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 17 done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 17 done — Post-flush verification"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 25

      # ── Stage 18: Post-flush verification ────────────────────────────────
      - name: "Stage 18: Post-flush verification"
        run: |
          bash scripts/dispatch-and-wait.sh post-flush-prep.yml 60 '{"repo_filter":"","block_on_failure":"false"}'
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 18 done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 18 done — Deploy book"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 26

      # ── Checkpoint 3: after core pipeline (stages 14–18) ────────────────
      # Pause/resume if quota is too low to continue into publishing phase.
      - name: "Quota checkpoint (post-core-pipeline)"
        run: |
          source scripts/includes/pipeline-guard.sh
          pipeline_guard_checkpoint 300 "post-core-pipeline"

      # ── Stage 19–25: Publishing + packaging (after all mirrors are current) ─
      - name: "Stage 19: Deploy book"
        run: |
          bash scripts/dispatch-and-wait.sh deploy-book.yml 60
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "Stage 20: Generate book pages"
        run: |
          bash scripts/dispatch-and-wait.sh generate-book-pages.yml 30
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "Stage 21: Update book index"
        run: |
          bash scripts/dispatch-and-wait.sh update-book-index.yml 20
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "Stage 22: Sync penguins-eggs docs to book"
        run: |
          bash scripts/dispatch-and-wait.sh sync-eggs-docs-to-book.yml 20
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "Stage 23: Generate OSP dependency graph"
        run: |
          bash scripts/dispatch-and-wait.sh generate-dep-graph.yml 30
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "Stage 24: Generate SBOM"
        run: |
          bash scripts/dispatch-and-wait.sh generate-sbom.yml 30
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "Stage 25: bdfs package"
        run: |
          bash scripts/dispatch-and-wait.sh bdfs-package.yml 60
          rc=$?; [[ $rc -eq 2 ]] && echo "Stage cancelled by queue-manager — continuing." || exit $rc

      - name: "ActivitySmith: stage 25 done"
        if: ${{ always() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: update_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "Stage 25 done — pipeline complete"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 29

      # ── ActivitySmith: end Live Activity + push notification on failure ────
      - name: "ActivitySmith: pipeline complete"
        if: ${{ success() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: end_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush"
              subtitle: "All 29 stages complete"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 29
              auto_dismiss_minutes: 5

      - name: "ActivitySmith: pipeline failed"
        if: ${{ failure() && steps.activity.outputs.live_activity_id != '' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: end_live_activity
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          live-activity-id: ${{ steps.activity.outputs.live_activity_id }}
          payload: |
            content_state:
              title: "Full Chain Flush failed"
              subtitle: "Check Actions for details"
              type: "segmented_progress"
              number_of_steps: 29
              current_step: 26
            action:
              title: "Open Run"
              type: "open_url"
              url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: "ActivitySmith: failure push notification"
        if: ${{ failure() && env.HAS_ACTIVITYSMITH == 'true' }}
        uses: ActivitySmithHQ/activitysmith-github-action@4995d0c29f638a311cf3c265941c4876e40065c9 # ratchet:ActivitySmithHQ/activitysmith-github-action@v1
        with:
          action: send_push_notification
          api-key: ${{ secrets.ACTIVITYSMITH_API_KEY }}
          payload: |
            title: "Full Chain Flush failed"
            message: "Pipeline failed — tap to open the run"
            redirection: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            actions:
              - title: "Open Run"
                type: "open_url"
                url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Pipeline guard end
        if: ${{ always() && inputs.managed_by_lifecycle != true }}
        run: |
          source scripts/includes/pipeline-guard.sh
          pipeline_guard_end "Full Chain Flush"

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh

  # Holds a second runner slot for the duration of the flush so the runner
  # pool is not fully consumed by lower-priority queued work while the flush
  # job is idle waiting for dispatched child workflows to complete.
  sentinel:
    name: Runner Sentinel
    runs-on: ubuntu-latest
    needs: [] # starts immediately, parallel to flush job
    timeout-minutes: 310
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # ratchet:step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: false

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7

      - name: Keepalive — hold runner slot
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          REPO: ${{ github.repository }}
          FLUSH_RUN_ID: ${{ github.run_id }}
          SENTINEL_MAX_MINUTES: "300"
          SENTINEL_POLL_SECONDS: "60"
        run: bash scripts/flush-sentinel.sh keepalive
