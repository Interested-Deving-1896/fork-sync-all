name: Update Workflow Triggers Doc

# Regenerates docs/workflow-triggers.md and docs/workflow-triggers.txt
# whenever a workflow file is added, changed, or removed on main.
# Commits the result directly to main.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'config/workflow-quota-costs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-workflow-triggers-doc
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Install dependencies
        run: pip install pyyaml --quiet

      - name: Regenerate docs
        run: |
          # generate-workflow-triggers-doc.py calls inject_triggers_index() from
          # generate-book-pages.py and copies docs/ → DOCS/ atomically.
          python3 scripts/generate-workflow-triggers-doc.py .

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/workflow-triggers.md docs/workflow-triggers.txt DOCS/workflow-triggers.md README.md DOCS/cover.md
          if git diff --cached --quiet; then
            echo "No changes to docs — skipping commit."
          else
            git commit -m "docs(auto): regenerate workflow triggers doc [skip ci]"
            # Retry push up to 3 times to handle concurrent auto-doc commits on main.
            # Each attempt: try push; on rejection fetch + rebase (ours wins on
            # conflict, both runs produce equivalent content) then try again.
            pushed=false
            for attempt in 1 2 3; do
              if git push; then
                pushed=true
                break
              fi
              echo "Push attempt ${attempt} failed — rebasing and retrying..."
              git fetch origin main
              git rebase -X ours origin/main
            done
            if [[ "$pushed" != "true" ]]; then
              echo "All push attempts failed." >&2
              exit 1
            fi
          fi
      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
