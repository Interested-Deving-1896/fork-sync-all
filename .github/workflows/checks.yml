name: Checks

on:
  push:
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpp-linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7

      - name: install deps
        run: |
          sudo apt-get update
          sudo apt-get upgrade -y
          sudo apt-get install -y libcurl4-openssl-dev
        shell: bash

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Debug

      - uses: cpp-linter/cpp-linter-action@820b1820ddd082ec68d266b7e6f47c65d78937bb # ratchet:cpp-linter/cpp-linter-action@v2.12.0
        id: linter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          style: file
          version: '18'
          database: ${{github.workspace}}/build

      - name: Fail fast?!
        if: steps.linter.outputs.checks-failed > 0
        run: |
          echo "Some files failed the linting checks!"
        # for actual deployment
        # run: exit 1

  check_clang_format:
    name: "Check C++ style"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7
      - name: Run clang-format style check for C/C++/Protobuf programs.
        uses: jidicula/clang-format-action@c74383674bf5f7c69f60ce562019c1c94bc1421a # ratchet:jidicula/clang-format-action@v4.13.0
        with:
          clang-format-version: '18'
          check-path: 'src'
          exclude-regex: 'src/subprocess.h'
