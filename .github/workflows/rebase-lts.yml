name: Rebuild LTS Branch (penguins-eggs)

on:
  # Run after the pieroproietti sync so master is already up to date
  workflow_run:
    workflows: ["Sync pieroproietti Forks"]
    types: [completed]
  # Also allow manual trigger
  workflow_dispatch:
    inputs:
      base_branch:
        description: "Branch to rebase onto (upstream default)"
        required: false
        default: "master"
      feature_branch:
        description: "Branch whose commits to rebase"
        required: false
        default: "all-features"
      lts_branch:
        description: "Branch to force-push the result to"
        required: false
        default: "lts"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  rebase-lts:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Only run if the triggering sync workflow succeeded (ignored for workflow_dispatch)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout fork-sync-all
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7

      - name: Rebuild lts on penguins-eggs
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          TARGET_REPO: ${{ github.repository_owner }}/penguins-eggs
          BASE_BRANCH: ${{ inputs.base_branch || 'master' }}
          FEATURE_BRANCH: ${{ inputs.feature_branch || 'all-features' }}
          LTS_BRANCH: ${{ inputs.lts_branch || 'lts' }}
          BUDGET_MINUTES: "55"
        run: bash scripts/rebase-lts.sh
      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
