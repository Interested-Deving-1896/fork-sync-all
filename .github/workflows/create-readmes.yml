name: Create Missing READMEs

on:
  schedule:
    - cron: '15 5 * * *'   # Daily at 05:15 UTC
  workflow_dispatch:
    inputs:
      repo_filter:
        description: "Repo name substring filter (blank = all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run — detect missing READMEs without creating them"
        type: boolean
        required: false
        default: false

concurrency:
  group: create-readmes
  cancel-in-progress: false  # Never cancel mid-creation

permissions:
  contents: write

jobs:
  create:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Create missing READMEs
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          GITHUB_OWNER: Interested-Deving-1896
          REPO_FILTER: ${{ inputs.repo_filter || '' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: bash scripts/create-readmes.sh