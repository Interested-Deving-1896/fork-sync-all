name: Validate Config

concurrency:
  group: validate-config-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - config/gitlab-subgroups.yml
      - config/workflow-sync.yml
      - config/workflow-cost-profiles.yml
      - config/workflow-priority-tiers.yml
      - config/template-manifest.yml
      - config/template-consumers.yml
      - registered-imports.json
      - scripts/validate-gitlab-subgroups.py
      - scripts/validate-workflow-guards.py
      - scripts/validate-registered-imports.py
      - scripts/validate-cost-profiles.py
      - scripts/validate-priority-tiers.py
      - scripts/validate-template-config.py
      - scripts/generate-gitlab-stubs.py
      - scripts/check-workflow-yaml.py
      - config/workflow-quota-costs.yml
      - tests/**
      - .github/workflows/**
      - .yamllint.yml
  pull_request:
    paths:
      - config/gitlab-subgroups.yml
      - config/workflow-sync.yml
      - config/workflow-cost-profiles.yml
      - config/workflow-priority-tiers.yml
      - config/workflow-quota-costs.yml
      - config/template-manifest.yml
      - config/template-consumers.yml
      - registered-imports.json
      - scripts/validate-gitlab-subgroups.py
      - scripts/validate-workflow-guards.py
      - scripts/validate-registered-imports.py
      - scripts/validate-cost-profiles.py
      - scripts/validate-priority-tiers.py
      - scripts/validate-template-config.py
      - scripts/generate-gitlab-stubs.py
      - scripts/check-workflow-yaml.py
      - tests/**
      - .github/workflows/**
      - .yamllint.yml
  workflow_dispatch:
    inputs:
      config_file:
        description: "Config file to validate (relative to repo root)"
        required: false
        default: "config/gitlab-subgroups.yml"

permissions:
  contents: read

jobs:
  fsa-check:
    name: Detect FSA mode
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      managed: ${{ steps.fsa.outputs.managed }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/includes/fsa-mode.sh
            scripts/write-summary.sh
          sparse-checkout-cone-mode: false
      - name: Check FSA mode
        id: fsa
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN || github.token }}
          FSA_MANAGED: ${{ vars.FSA_MANAGED }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          source scripts/includes/fsa-mode.sh
          if fsa_is_managed; then
            echo "managed=true" >> "$GITHUB_OUTPUT"
          else
            echo "managed=false" >> "$GITHUB_OUTPUT"
            echo "Autonomous mode — fork-sync-all-specific validators will be skipped."
          fi

  validate-gitlab-subgroups:
    name: Validate gitlab-subgroups.yml
    needs: fsa-check
    if: needs.fsa-check.outputs.managed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Validate config/gitlab-subgroups.yml
        env:
          CONFIG_FILE: ${{ inputs.config_file || 'config/gitlab-subgroups.yml' }}
        run: python3 scripts/validate-gitlab-subgroups.py "$CONFIG_FILE"

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh

  validate-workflow-guards:
    name: Validate workflow guards and GitLab CI refs
    needs: fsa-check
    if: needs.fsa-check.outputs.managed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Parse-check all workflow YAML files
        run: python3 scripts/check-workflow-yaml.py

      - name: Check guards, quota-costs names, workflow_run refs, GitLab CI script refs
        run: python3 scripts/validate-workflow-guards.py

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh

  validate-registered-imports:
    name: Validate registered-imports.json
    needs: fsa-check
    if: needs.fsa-check.outputs.managed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Validate registered-imports.json schema
        run: python3 scripts/validate-registered-imports.py

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh

  validate-cost-profiles:
    name: Validate workflow-cost-profiles.yml
    needs: fsa-check
    if: needs.fsa-check.outputs.managed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Validate config/workflow-cost-profiles.yml schema
        run: python3 scripts/validate-cost-profiles.py

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh

  validate-priority-tiers:
    name: Validate workflow-priority-tiers.yml
    needs: fsa-check
    if: needs.fsa-check.outputs.managed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Validate config/workflow-priority-tiers.yml schema
        run: python3 scripts/validate-priority-tiers.py

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh

  validate-template-config:
    name: Validate template-manifest.yml and template-consumers.yml
    needs: fsa-check
    if: needs.fsa-check.outputs.managed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Validate template manifest and consumers
        run: python3 scripts/validate-template-config.py

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh

  pytest:
    name: Validator unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pytest-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-pytest-
            ${{ runner.os }}-pip-

      - name: Install pytest
        run: pip install pytest --quiet

      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh

  lint-yaml:
    name: Lint YAML config files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-yamllint-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-yamllint-
            ${{ runner.os }}-pip-

      - name: Install yamllint
        run: pip install yamllint --quiet

      - name: Lint config YAML files
        # yamllint is the Python reference linter (same rules as yamllint-ts in yaml-tooling_deving).
        # Rules are defined in .yamllint.yml at the repo root.
        run: |
          yamllint -c .yamllint.yml \
            config/gitlab-subgroups.yml \
            config/workflow-cost-profiles.yml \
            config/workflow-priority-tiers.yml \
            config/workflow-sync.yml \
            config/template-manifest.yml \
            config/template-consumers.yml

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh

  scan-agent-configs:
    name: AgentShield — scan AI agent configs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Opt-in: only runs when the secret is set. Fails on critical findings.
    if: always()
    steps:
      - uses: actions/checkout@v6

      - name: Run AgentShield scan
        # Scans .claude/ for hardcoded secrets, permission misconfigs, hook
        # injection vectors, and MCP server risks. Fails on critical findings.
        run: |
          npx --yes ecc-agentshield scan \
            --path . \
            --format json \
            --output /tmp/agentshield-report.json || true
          # Parse report and fail if any critical findings exist
          python3 - << 'PYEOF'
          import json, sys, os
          report_path = "/tmp/agentshield-report.json"
          if not os.path.exists(report_path):
              print("AgentShield: no report generated (no .claude/ directory or scan skipped)")
              sys.exit(0)
          try:
              report = json.load(open(report_path))
          except Exception as e:
              print(f"AgentShield: could not parse report: {e}")
              sys.exit(0)
          findings = report.get("findings", [])
          criticals = [f for f in findings if f.get("severity") == "critical"]
          grade = report.get("grade", "?")
          score = report.get("score", "?")
          print(f"AgentShield grade: {grade} ({score}/100)")
          print(f"Total findings: {len(findings)} ({len(criticals)} critical)")
          if criticals:
              print("Critical findings:")
              for f in criticals[:10]:
                  print(f"  [{f.get('severity','?')}] {f.get('title','?')} — {f.get('file','?')}:{f.get('line','?')}")
              sys.exit(1)
          PYEOF

      - name: Upload AgentShield report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: agentshield-report
          path: /tmp/agentshield-report.json
          if-no-files-found: ignore

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh

  validate-workflow-schemas:
    name: Validate workflow YAML schemas (gavi)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Cache npm global packages
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-gavi-${{ hashFiles('**/package-lock.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-gavi-
            ${{ runner.os }}-npm-

      - name: Install gavi
        run: npm install -g gavi --quiet

      - name: Validate all workflow files
        # gavi validates .github/workflows/*.yml against the official GitHub Actions
        # JSON schema (json.schemastore.org/github-workflow). Catches structural
        # errors that Python validators miss (wrong step keys, bad trigger syntax, etc).
        run: |
          failed=0
          for f in .github/workflows/*.yml .github/workflows/*.yaml; do
            [ -f "$f" ] || continue
            if ! gavi workflow "$f" 2>&1; then
              echo "::error file=$f::gavi validation failed"
              failed=1
            fi
          done
          exit $failed

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh

  # ── Required status check gate ────────────────────────────────────────────
  # Set THIS job as the required status check in branch protection — not the
  # individual job names above. FSA-specific jobs are skipped in autonomous
  # mode (consumer repos); skipped jobs must not block PRs.
  ci-required:
    name: CI Required
    runs-on: ubuntu-latest
    needs:
      - fsa-check
      - validate-gitlab-subgroups
      - validate-workflow-guards
      - validate-registered-imports
      - validate-cost-profiles
      - validate-priority-tiers
      - validate-template-config
      - pytest
      - lint-yaml
      - scan-agent-configs
      - validate-workflow-schemas
    if: always()
    steps:
      - name: Check results
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "Job results: ${results}"
          if echo "${results}" | grep -qw "failure"; then
            echo "One or more validation jobs failed."
            exit 1
          fi
          echo "All validations passed (skipped jobs are acceptable)."
