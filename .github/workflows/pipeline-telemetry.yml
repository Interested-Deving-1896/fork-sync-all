name: Pipeline Telemetry

# Local equivalent of Thoth's workflow-level OpenTelemetry instrumentation.
# Fires after any monitored workflow completes and produces:
#
#   - Step summary: span waterfall (workflow→jobs→steps), metrics table,
#                   log events (warnings/errors), matching Thoth's signal set
#   - Trace artifact: per-run JSON with full span tree + metrics (30-day retention)
#   - Rolling issue: weekly metrics dashboard upserted in-place (pipeline-telemetry label)
#
# Signal parity with Thoth workflow-level instrumentation:
#   Spans   : workflow → job → step hierarchy with timing + conclusion
#   Metrics : github.actions.{workflows,jobs,steps,actions} counts + durations
#             cicd.pipeline.run.duration per job, cicd.pipeline.run.errors
#   Logs    : ::error:: / ::warning:: / [command] severity mapping per step
#   Attrs   : id, name, conclusion, actor, event, ref, sha, url (github.actions.*)
#   Actions : Pre/Main/Post phase detection + action name/ref from step name
#   Retry   : previous attempt run_id linked in trace record
#
# Monitored workflows (add any workflow name here to instrument it):
#   - Full Chain Flush
#   - Pre-Flush Prep
#   - Mirror Interested-Deving-1896 → OSP
#   - Mirror OSP → GitLab
#   - Mirror to OpenOS-Project-Ecosystem-OOC
#   - Reconcile Org References
#   - Check OSP-Bound CI Status
#   - Sync All Forks
#   - Sync Registered Imports
#   - Pre-Mirror CI Gate
#   - Verify Mirror Integrity
#   - Post-Flush Verification

on:
  workflow_run:
    workflows:
      - "Full Chain Flush"
      - "Pre-Flush Prep"
      - "Mirror Interested-Deving-1896 → OSP"
      - "Mirror OSP → GitLab"
      - "Mirror to OpenOS-Project-Ecosystem-OOC"
      - "Reconcile Org References"
      - "Check OSP-Bound CI Status"
      - "Sync All Forks"
      - "Sync Registered Imports"
      - "Pre-Mirror CI Gate"
      - "Verify Mirror Integrity"
      - "Post-Flush Verification"
    types:
      - completed
  workflow_dispatch:
    inputs:
      run_id:
        description: "Workflow run ID to instrument (required for manual dispatch)"
        required: true
        type: string
      run_attempt:
        description: "Run attempt number"
        required: false
        default: "1"
        type: string
      update_issue:
        description: "Upsert rolling metrics issue"
        required: false
        default: true
        type: boolean
      issue_window_days:
        description: "Rolling window for metrics issue (days)"
        required: false
        default: "30"
        type: string

permissions:
  actions: read
  contents: read
  issues: write

concurrency:
  group: pipeline-telemetry-${{ github.event.workflow_run.id || inputs.run_id }}
  cancel-in-progress: false

jobs:
  telemetry:
    name: Pipeline Telemetry
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
      REPO: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Quota pre-flight
        id: quota
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          MIN_QUOTA: "200"
        run: |
          source scripts/includes/quota-snapshot.sh
          quota_snapshot

      - name: Run pipeline telemetry
        if: steps.quota.outputs.skip == 'false'
        env:
          RUN_ID: ${{ github.event.workflow_run.id || inputs.run_id }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt || inputs.run_attempt || '1' }}
          # Only upsert the rolling issue when triggered by Full Chain Flush,
          # or on manual dispatch with update_issue=true. All other workflow_run
          # triggers skip the issue update to avoid 12 upserts per flush cycle.
          UPDATE_ISSUE: ${{ inputs.update_issue != '' && inputs.update_issue || (github.event.workflow_run.name == 'Full Chain Flush' && 'true' || 'false') }}
          ISSUE_WINDOW_DAYS: ${{ inputs.issue_window_days || '30' }}
          ARTIFACT_DIR: /tmp/telemetry
          MIN_QUOTA: "200"
        run: |
          source scripts/includes/quota-instrument.sh
          qi_begin
          bash scripts/pipeline-telemetry.sh
          qi_end

      - name: Upload trace artifact
        if: steps.quota.outputs.skip == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: pipeline-trace-${{ github.event.workflow_run.id || inputs.run_id }}-${{ github.event.workflow_run.run_attempt || inputs.run_attempt || '1' }}
          path: /tmp/telemetry/trace_*.json
          retention-days: 30
          if-no-files-found: warn

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
