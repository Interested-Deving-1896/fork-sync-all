name: Token Health Monitor

# Checks expiry and staleness of all GitHub Actions secrets used by
# fork-sync-all. Opens a GitHub issue when any token needs attention
# (expiring within 30 days, expired, or not rotated in 90 days).
# Closes the issue automatically when all tokens are healthy.
#
# Runs weekly on Monday at 09:00 UTC so alerts arrive at the start of
# the work week with plenty of time to act before expiry.
#

on:
  schedule:
    - cron: '0 9 * * 1'   # Weekly Monday at 09:00 UTC
  workflow_dispatch:
    inputs:
      warn_days:
        description: 'Days before expiry to start warning'
        required: false
        type: string
        default: '30'
      stale_days:
        description: 'Days since last rotation before flagging as stale'
        required: false
        type: string
        default: '90'

permissions:
  contents: read
  issues: write   # Open/close/update the alert issue

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check token health
        id: check
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_SYNC_TOKEN }}
          REPO: Interested-Deving-1896/fork-sync-all
          WARN_DAYS: ${{ inputs.warn_days || '30' }}
          STALE_DAYS: ${{ inputs.stale_days || '90' }}
        run: |
          bash scripts/token-monitor.sh && echo "needs_attention=false" >> "$GITHUB_OUTPUT" \
            || echo "needs_attention=true" >> "$GITHUB_OUTPUT"

      - name: Open or update alert issue
        if: steps.check.outputs.needs_attention == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          existing=$(gh issue list \
            --repo Interested-Deving-1896/fork-sync-all \
            --label "token-monitor" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          body="## Token Monitor Alert

One or more secrets used by fork-sync-all need attention.

See the [workflow run summary](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details and rotation links.

**Quick links:**
- [View/manage PATs](https://github.com/settings/tokens)
- [Rotate Secret Token workflow](https://github.com/Interested-Deving-1896/fork-sync-all/actions/workflows/rotate-token.yml)
- [GitLab PATs](https://gitlab.com/-/user_settings/personal_access_tokens)

_This issue is managed automatically by the Token Monitor workflow. It will be closed when all tokens are healthy._"

          if [[ -n "$existing" ]]; then
            gh issue comment "$existing" \
              --repo Interested-Deving-1896/fork-sync-all \
              --body "**Updated $(date -u +%Y-%m-%d):** Token health check re-run. See [run summary](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for current status."
            echo "Updated existing issue #${existing}"
          else
            gh issue create \
              --repo Interested-Deving-1896/fork-sync-all \
              --title "⚠️ Token Monitor: action required" \
              --body "$body" \
              --label "token-monitor"
            echo "Created new alert issue"
          fi

      - name: Close alert issue if all healthy
        if: steps.check.outputs.needs_attention == 'false'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          existing=$(gh issue list \
            --repo Interested-Deving-1896/fork-sync-all \
            --label "token-monitor" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [[ -n "$existing" ]]; then
            gh issue close "$existing" \
              --repo Interested-Deving-1896/fork-sync-all \
              --comment "All tokens are healthy as of $(date -u +%Y-%m-%d). Closing."
            echo "Closed issue #${existing}"
          else
            echo "No open alert issue — nothing to close."
          fi

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
