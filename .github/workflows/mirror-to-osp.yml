name: Mirror Interested-Deving-1896 → OSP

on:
  schedule:
    # Every 6h at :13 — staggered off :00 boundary to avoid runner contention.
    # mirror-osp-to-ooc runs at :15 */6, giving OSP 2 min to settle first.
    - cron: '13 */6 * * *'
  workflow_dispatch:
    inputs:
      repo_filter:
        description: "Mirror only this repo name (leave blank for all)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Report without pushing to OSP"
        required: false
        default: false
        type: boolean
      force:
        description: "Force-push even if OSP branch has diverged"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

# ── Rate limits ──────────────────────────────────────────────────────────────
# GitHub REST API (SYNC_TOKEN): 5 000 req/hr primary limit.
#   mirror-to-osp.sh retries HTTP 403/429 up to 3 times, sleeping until
#   X-RateLimit-Reset before each retry.
# git push: transient rejections retried up to 3 times with 5 s backoff.
#   SYNC_TOKEN requires the `workflow` scope to push repos containing
#   .github/workflows/ — a missing scope logs a clear error and skips that
#   repo rather than retrying indefinitely.

concurrency:
  group: mirror-to-osp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # ratchet:step-security/harden-runner@v2
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443,github.com:443,objects.githubusercontent.com:443
          disable-sudo: false
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7

      - name: Detect chain position
        id: node
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          FSA_MANAGED: ${{ vars.FSA_MANAGED }}
          REPO_OWNER: ${{ github.repository_owner }}
          FSA_CHAIN_POSITION: ""
          FSA_UPSTREAM_OWNER: ""
        run: |
          source scripts/includes/fsa-node-identity.sh
          fsa_node_detect
          fsa_node_summary

      - name: Mirror matched repos from upstream into OSP
        # Only source and downstream-fork positions push to a downstream GitHub org.
        # A mirror node (e.g. OSP itself) should not re-mirror — it receives pushes.
        if: steps.node.outputs.fsa_node_position != 'mirror'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          UPSTREAM_OWNER: ${{ steps.node.outputs.fsa_node_owner }}
          OSP_ORG: OpenOS-Project-OSP
          BUDGET_MINUTES: "25"
        run: |
          source scripts/includes/quota-instrument.sh
          qi_begin
          bash scripts/mirror-to-osp.sh
          qi_end

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
