name: List Chromium GitLab Repos
on:
  workflow_dispatch:
concurrency:
  group: list-chromium-repos
  cancel-in-progress: true

jobs:
  list:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GITLAB_TOKEN: ${{ secrets.GITLAB_SYNC_TOKEN }}
      GL_API: https://gitlab.com/api/v4
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7
      - name: List all Chromium_Browser_OS_Deving projects
        run: python3 scripts/list-chromium-gl-repos.py
      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
