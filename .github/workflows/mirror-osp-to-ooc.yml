name: Mirror to OpenOS-Project-Ecosystem-OOC

# Sync chain:
#   Interested-Deving-1896  ->(upstream mirror.yaml)->  OpenOS-Project-OSP
#   OpenOS-Project-OSP  ->(this file)->  OpenOS-Project-Ecosystem-OOC

on:
  schedule:
    - cron: "49 1/6 * * *" # Every 6h at :49 — fires at 01:49/07:49/13:49/19:49 UTC, 32 min after mirror-to-osp (:17) to let OSP settle
  workflow_dispatch:
  # Note: push trigger removed — this workflow only executes in OpenOS-Project-OSP/lkm
  # (guarded by the job-level if condition). Firing on every push here wastes runner slots.

concurrency:
  group: mirror-osp-to-ooc
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    # Only run when executing in the OSP repo — no-op if mirrored elsewhere
    if: github.repository == 'OpenOS-Project-OSP/lkm'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # ratchet:step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: false
      - name: Checkout full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch all branches and tags
        run: git fetch --all --tags --prune

      - name: Push mirror to OpenOS-Project-Ecosystem-OOC
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          git config --global credential.helper store
          printf 'https://x-access-token:%s@github.com\n' "$MIRROR_TOKEN" \
            > ~/.git-credentials

          git remote add mirror \
            "https://github.com/OpenOS-Project-Ecosystem-OOC/lkm.git"

          git push mirror --all --force
          git push mirror --tags --force

          rm -f ~/.git-credentials
