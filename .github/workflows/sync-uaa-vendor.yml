name: Sync UAA Vendor

# Keeps vendor/unified-agnostic-api and fsa-api/uaa/ in sync with the upstream
# Interested-Deving-1896/unified-agnostic-api repo.
#
# fsa-api/uaa/ is the FSA API's embedded copy of UAA — it is kept in sync
# alongside vendor/ so the FSA server always runs against the latest UAA base.
#
# On push: triggered when vendor/unified-agnostic-api/** or fsa-api/uaa/** changes.
# On schedule: weekly pull of upstream changes into both destinations.
# On dispatch: manual sync with optional ref override.

on:
  push:
    branches: [main]
    paths:
      - 'vendor/unified-agnostic-api/**'
      - 'fsa-api/uaa/**'
      - '.github/workflows/sync-uaa-vendor.yml'
  schedule:
    - cron: '0 5 * * 2'  # Tuesday 05:00 UTC
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: 'Upstream ref to sync from (branch/tag/SHA, default: main)'
        required: false
        default: 'main'
        type: string
      dry_run:
        description: 'Dry run — show diff without committing'
        required: false
        default: false
        type: boolean

concurrency:
  group: sync-uaa-vendor
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    name: Sync vendor/unified-agnostic-api + fsa-api/uaa
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        if: steps.quota.outputs.skip == 'false'
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          fetch-depth: 0

      - name: Quota pre-flight
        id: quota
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          MIN_QUOTA: "100"
        run: |
          source scripts/includes/quota-snapshot.sh
          quota_snapshot

      - name: Sync from upstream
        if: steps.quota.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          UPSTREAM_REF: ${{ inputs.upstream_ref || 'main' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          source scripts/includes/quota-instrument.sh
          qi_begin
          UPSTREAM="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository_owner }}/unified-agnostic-api.git"
          VENDOR_DIR="vendor/unified-agnostic-api"

          # Sparse-clone upstream into a temp directory, then rsync into vendor/
          TMP_CLONE="$(mktemp -d)"
          git clone \
            --depth=1 \
            --filter=blob:none \
            --sparse \
            "$UPSTREAM" "$TMP_CLONE" 2>/dev/null

          UPSTREAM_SHA="$(git -C "$TMP_CLONE" rev-parse HEAD)"
          echo "Upstream SHA: $UPSTREAM_SHA"

          # Rsync upstream content into both destinations.
          # Exclude .git and CI workflows (those belong to the upstream repo, not here).
          FSA_UAA_DIR="fsa-api/uaa"
          for DEST in "$VENDOR_DIR" "$FSA_UAA_DIR"; do
            rsync -a --delete \
              --exclude='.git' \
              --exclude='.github' \
              "$TMP_CLONE/" "$DEST/"
          done

          rm -rf "$TMP_CLONE"

          # Check for changes across both destinations
          if git diff --quiet HEAD -- "$VENDOR_DIR/" "$FSA_UAA_DIR/"; then
            echo "No changes — both destinations already up to date."
            exit 0
          fi

          git diff --stat HEAD -- "$VENDOR_DIR/" "$FSA_UAA_DIR/"

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "Dry run — not committing."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$VENDOR_DIR/" "$FSA_UAA_DIR/"
          SHORT="${UPSTREAM_SHA:0:7}"
          git commit \
            -m "chore(vendor): sync unified-agnostic-api from upstream ${SHORT}" \
            -m "Synced from Interested-Deving-1896/unified-agnostic-api@${SHORT} into vendor/ and fsa-api/uaa/" \
            -m "Co-authored-by: Ona <no-reply@ona.com>"
          git push origin main
          qi_end

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
