name: Sync All Forks

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# ── Rate limits ──────────────────────────────────────────────────────────────
# GitHub REST API (SYNC_TOKEN): 5 000 req/hr primary limit.
#   sync-all-forks.sh reads X-RateLimit-Reset from response headers and sleeps
#   until the reset window before retrying HTTP 403/429 (up to 3 attempts).
#   If the limit is hit mid-run the script sleeps until reset and continues —
#   it does not fail the workflow.
# timeout-minutes: 355 (just under GitHub's 6 h hard limit). The script
#   self-limits at 335 min so it always exits cleanly before this fires.

jobs:
  sync:
    runs-on: ubuntu-latest
    # 355 min = just under GitHub's 6h hard limit. The script self-limits at
    # 335 min so it always exits cleanly before this timeout fires.
    timeout-minutes: 355
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync all forks
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: bash scripts/sync-all-forks.sh
