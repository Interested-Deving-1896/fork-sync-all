name: Sync All Forks

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: "7 6 * * *"
  workflow_dispatch:
    inputs:
      repo_filter:
        description: "Sync only this repo (leave blank for all)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Report without syncing"
        required: false
        default: false
        type: boolean
      force:
        description: "Force-push even if diverged"
        required: false
        default: false
        type: boolean
      branch_filter:
        description: "Sync only this branch (leave blank for all)"
        required: false
        default: ""
        type: string
      rate_limit_rerun:
        description: "Set by rate-limit-rerun workflow — prevents re-trigger loops"
        required: false
        default: "false"
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  sync:
    if: inputs.rate_limit_rerun != 'true'
    runs-on: ubuntu-latest
    # 355 min = just under GitHub's 6h hard limit. The script self-limits at
    # 335 min so it always exits cleanly before this timeout fires.
    timeout-minutes: 355
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Quota pre-flight
        id: quota
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          MIN_QUOTA: "1500"
        run: |
          source scripts/includes/quota-snapshot.sh
          quota_snapshot

      - name: Sync all forks
        if: steps.quota.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: |
          source scripts/includes/quota-instrument.sh
          qi_begin
          bash scripts/sync-all-forks.sh
          qi_end
      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
