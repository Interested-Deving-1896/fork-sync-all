name: Pre-Mirror CI Gate

# Checks CI status on all OSP-bound repos in Interested-Deving-1896 before
# they are mirrored outward to OSP. Dispatches resolve-failures.yml for any
# red repos, waits, then re-checks. Blocks the mirror if repos are still
# failing after the resolver runs (configurable via block_on_fail).
#
# Called by full-chain-flush.yml between stage 4 and stage 5 via workflow_call.
# Also fires automatically after Reconcile Org References completes standalone,
# acting as a CI gate before the next mirror run picks up the changes.
# Can also be run manually.

on:
  workflow_run:
    workflows:
      - "Reconcile Org References"
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Report failures without dispatching resolver"
        required: false
        default: false
        type: boolean
      repo_filter:
        description: "Check only repos matching this substring (blank = all)"
        required: false
        default: ""
        type: string
      block_on_fail:
        description: "Fail this workflow if repos are still red after resolver"
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      dry_run:
        type: boolean
        default: false
      repo_filter:
        type: string
        default: ""
      block_on_fail:
        type: boolean
        default: true

permissions:
  actions: write
  contents: read

concurrency:
  group: pre-mirror-ci-gate
  cancel-in-progress: true

jobs:
  gate:
    name: Pre-Mirror CI Gate
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_call' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
      REPO: ${{ github.repository }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # ratchet:step-security/harden-runner@v2
        with:
          egress-policy: audit
          disable-sudo: false
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7

      - name: Quota pre-flight
        id: quota
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          MIN_QUOTA: "800"
        run: |
          source scripts/includes/quota-snapshot.sh
          quota_snapshot

      - name: Run pre-mirror CI gate
        if: steps.quota.outputs.skip == 'false'
        id: gate
        env:
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          REPO_FILTER: ${{ inputs.repo_filter || '' }}
          # workflow_run: report-only — don't hard-block the chain from a
          # standalone reconcile run; the flush itself enforces block_on_fail.
          BLOCK_ON_FAIL: ${{ github.event_name == 'workflow_run' && 'false' || inputs.block_on_fail || 'true' }}
          BUDGET_MINUTES: "80"
          MIN_QUOTA: "800"
        run: |
          source scripts/includes/quota-instrument.sh
          qi_begin
          bash scripts/pre-mirror-ci-gate.sh
          qi_end

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
