name: Delete Stale Repos

# Deletes repos that have been superseded or renamed from any combination of
# GitHub orgs and GitLab groups. All targets are specified via inputs so this
# workflow is reusable for any future cleanup — no hardcoding required.
#
# Requires:
#   SYNC_TOKEN        — GitHub PAT with delete_repo scope on target orgs
#   GITLAB_SYNC_TOKEN — GitLab PAT with api + owner scope on target groups

on:
  workflow_dispatch:
    inputs:
      github_repos:
        description: >
          Space-separated list of GitHub repos to delete in owner/repo format.
          Example: OpenOS-Project-OSP/old-repo OpenOS-Project-Ecosystem-OOC/old-repo
        required: false
        default: ''
        type: string
      gitlab_project_ids:
        description: >
          Space-separated list of GitLab numeric project IDs to delete.
          Find IDs at: gitlab.com/group/subgroup/repo → Settings → General.
          Example: 81413316 99887766
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Print what would be deleted without deleting'
        required: false
        default: 'true'
        type: boolean

concurrency:
  group: delete-stale-repos
  cancel-in-progress: false

jobs:
  delete:
    name: Delete stale repos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Sample quota before
        run: |
          source scripts/includes/quota-instrument.sh
          qi_begin
          # Persist _QI_BEFORE across steps via a temp file
          echo "$_QI_BEFORE" > /tmp/qi_before

      - name: Delete from GitHub
        if: inputs.github_repos != ''
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
          DRY_RUN:    ${{ inputs.dry_run }}
          REPOS:      ${{ inputs.github_repos }}
        run: |
          for repo in $REPOS; do
            echo "── ${repo} ──"
            status=$(curl -sf -o /dev/null -w "%{http_code}" \
              -H "Authorization: token ${SYNC_TOKEN}" \
              "https://api.github.com/repos/${repo}" 2>/dev/null || echo "000")
            if [[ "$status" == "404" ]]; then
              echo "  Already gone (404)"
              continue
            fi
            if [[ "$DRY_RUN" == "true" ]]; then
              echo "  DRY: would DELETE https://api.github.com/repos/${repo}"
            else
              rc=$(curl -sf -o /dev/null -w "%{http_code}" -X DELETE \
                -H "Authorization: token ${SYNC_TOKEN}" \
                "https://api.github.com/repos/${repo}" 2>/dev/null || echo "000")
              if [[ "$rc" == "204" ]]; then
                echo "  ✅ Deleted"
              else
                echo "  ❌ Failed (HTTP $rc)"
                exit 1
              fi
            fi
          done

      - name: Delete from GitLab
        if: inputs.gitlab_project_ids != ''
        env:
          GITLAB_SYNC_TOKEN: ${{ secrets.GITLAB_SYNC_TOKEN }}
          DRY_RUN:           ${{ inputs.dry_run }}
          PROJECT_IDS:       ${{ inputs.gitlab_project_ids }}
        run: |
          for project_id in $PROJECT_IDS; do
            echo "── GitLab project ID ${project_id} ──"
            name=$(curl -sf \
              -H "PRIVATE-TOKEN: ${GITLAB_SYNC_TOKEN}" \
              "https://gitlab.com/api/v4/projects/${project_id}" \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('path_with_namespace','?'))" \
              2>/dev/null || echo "unknown")
            status=$(curl -sf -o /dev/null -w "%{http_code}" \
              -H "PRIVATE-TOKEN: ${GITLAB_SYNC_TOKEN}" \
              "https://gitlab.com/api/v4/projects/${project_id}" 2>/dev/null || echo "000")
            if [[ "$status" == "404" ]]; then
              echo "  Already gone (404)"
              continue
            fi
            if [[ "$DRY_RUN" == "true" ]]; then
              echo "  DRY: would DELETE gitlab.com/api/v4/projects/${project_id} (${name})"
            else
              rc=$(curl -sf -o /dev/null -w "%{http_code}" -X DELETE \
                -H "PRIVATE-TOKEN: ${GITLAB_SYNC_TOKEN}" \
                "https://gitlab.com/api/v4/projects/${project_id}" 2>/dev/null || echo "000")
              if [[ "$rc" == "202" || "$rc" == "204" ]]; then
                echo "  ✅ Deleted ${name} (HTTP $rc — GitLab queues deletion asynchronously)"
              else
                echo "  ❌ Failed (HTTP $rc)"
                exit 1
              fi
            fi
          done

      - name: Summary
        if: always()
        run: |
          echo "## Delete Stale Repos" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**dry_run:** ${{ inputs.dry_run }}" >> "$GITHUB_STEP_SUMMARY"
          if [[ -n "${{ inputs.github_repos }}" ]]; then
            echo "**GitHub repos:** \`${{ inputs.github_repos }}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [[ -n "${{ inputs.gitlab_project_ids }}" ]]; then
            echo "**GitLab project IDs:** \`${{ inputs.gitlab_project_ids }}\`" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Emit quota delta — restore _QI_BEFORE from the temp file written by
          # the "Sample quota before" step (separate shell, so variable is gone).
          source scripts/includes/quota-instrument.sh
          if [[ -f /tmp/qi_before ]]; then
            _QI_BEFORE=$(cat /tmp/qi_before)
            qi_end
          fi
