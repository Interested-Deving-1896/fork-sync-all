name: Generate NotebookLM Content

on:
  workflow_dispatch:
    inputs:
      notebook_id:
        description: 'NotebookLM notebook ID'
        required: true
        type: string
      content_types:
        description: 'Comma-separated content types to generate'
        required: false
        default: 'audio,video,slide-deck,infographic,quiz,flashcards,report'
        type: string
      release_tag:
        description: 'GitHub Release tag to upload to (notebooklm-YYYY-MM-DD)'
        required: true
        type: string
      audio_format:
        description: 'Audio overview format'
        required: false
        default: 'deep-dive'
        type: choice
        options:
          - deep-dive
          - brief
          - critique
          - debate
      video_format:
        description: 'Video overview format'
        required: false
        default: 'explainer'
        type: choice
        options:
          - explainer
          - brief
          - cinematic
      report_format:
        description: 'Report format'
        required: false
        default: 'briefing-doc'
        type: choice
        options:
          - briefing-doc
          - study-guide
          - blog-post
      skip_upload:
        description: 'Generate and download only — skip GitHub Release upload'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Print commands without executing (no generation, no upload)'
        required: false
        default: false
        type: boolean

concurrency:
  group: generate-notebooklm
  cancel-in-progress: false

jobs:
  generate:
    name: Generate NotebookLM Content
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install notebooklm-py
        run: |
          pip install --quiet "notebooklm-py[browser]"
          playwright install chromium --with-deps
          notebooklm --version

      - name: Verify auth
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: |
          if [[ -z "${NOTEBOOKLM_AUTH_JSON:-}" ]]; then
            echo "::error::Secret NOTEBOOKLM_AUTH_JSON is not set." \
              "Paste the contents of ~/.notebooklm/profiles/default/storage_state.json" \
              "into Settings → Secrets → NOTEBOOKLM_AUTH_JSON."
            exit 1
          fi
          notebooklm auth check --test

      - name: Generate and download artifacts
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: |
          UPLOAD_FLAG=""
          [[ "${{ inputs.skip_upload }}" == "true" ]] && UPLOAD_FLAG="--skip-upload"

          DRY_FLAG=""
          [[ "${{ inputs.dry_run }}" == "true" ]] && DRY_FLAG="--dry-run"

          RELEASE_ARG=""
          [[ "${{ inputs.skip_upload }}" != "true" ]] && RELEASE_ARG="--release-tag ${{ inputs.release_tag }}"

          bash scripts/generate-notebooklm.sh \
            --notebook-id "${{ inputs.notebook_id }}" \
            --types "${{ inputs.content_types }}" \
            --audio-format "${{ inputs.audio_format }}" \
            --video-format "${{ inputs.video_format }}" \
            --report-format "${{ inputs.report_format }}" \
            --output-dir /tmp/notebooklm-output \
            ${RELEASE_ARG} \
            ${UPLOAD_FLAG} \
            ${DRY_FLAG}

      - name: Upload artifacts to Actions (backup)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: notebooklm-${{ inputs.release_tag }}-${{ github.run_number }}
          path: /tmp/notebooklm-output/
          if-no-files-found: ignore
          retention-days: 7

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
