name: Generate NotebookLM Content

# Backend-agnostic NotebookLM content generator.
# Reads config/notebooklm-backends.yml for the list of supported backends.
# Each backend has its own docs/ subdirectory, required secrets, and capabilities.
#
# Actions:
#   generate         — generate content using the selected backend
#   list-backends    — print all registered backends and their status
#   register-backend — add a new backend entry to the registry (opens a PR)

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: false
        default: 'generate'
        type: choice
        options:
          - generate
          - list-backends
          - register-backend
      backend:
        description: 'Backend ID (from config/notebooklm-backends.yml)'
        required: false
        default: 'google-notebooklm'
        type: choice
        options:
          - google-notebooklm
          - open-notebook
          - openbooklm
          - open-notebooklm
      content_types:
        description: 'Comma-separated content types (audio-overview,reports,etc.)'
        required: false
        default: 'audio-overview'
        type: string
      notebook_id:
        description: '[google-notebooklm] NotebookLM notebook ID'
        required: false
        type: string
      audio_format:
        description: '[google-notebooklm] Audio overview format'
        required: false
        default: 'deep-dive'
        type: choice
        options:
          - deep-dive
          - brief
          - critique
          - debate
      video_format:
        description: '[google-notebooklm] Video overview format'
        required: false
        default: 'explainer'
        type: choice
        options:
          - explainer
          - brief
          - cinematic
      report_format:
        description: '[google-notebooklm] Report format'
        required: false
        default: 'briefing-doc'
        type: choice
        options:
          - briefing-doc
          - study-guide
          - blog-post
      release_tag:
        description: '[google-notebooklm] GitHub Release tag for upload'
        required: false
        type: string
      source_pdf:
        description: '[open-notebooklm] Path to source PDF (relative to repo root)'
        required: false
        type: string
      new_backend_id:
        description: '[register-backend] Machine ID (e.g. my-backend)'
        required: false
        type: string
      new_backend_name:
        description: '[register-backend] Display name'
        required: false
        type: string
      new_backend_repo:
        description: '[register-backend] GitHub repo (owner/repo)'
        required: false
        type: string
      new_backend_type:
        description: '[register-backend] Backend type'
        required: false
        default: 'self-hosted'
        type: choice
        options:
          - hosted
          - self-hosted
          - local
          - gradio
      new_backend_capabilities:
        description: '[register-backend] Comma-separated capabilities'
        required: false
        default: 'audio-overview'
        type: string
      new_backend_description:
        description: '[register-backend] One-line description'
        required: false
        type: string
      skip_upload:
        description: 'Skip GitHub Release upload'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Print commands without executing'
        required: false
        default: false
        type: boolean

concurrency:
  group: generate-notebooklm-${{ github.event.inputs.backend || 'default' }}
  cancel-in-progress: false

jobs:
  list-backends:
    name: List registered backends
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'list-backends'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7
      - name: List backends
        run: bash scripts/notebooklm-list-backends.sh

  register-backend:
    name: Register new backend
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'register-backend'
    permissions:
      contents: write
      pull-requests: write
    env:
      NEW_ID: ${{ inputs.new_backend_id }}
      NEW_NAME: ${{ inputs.new_backend_name }}
      NEW_REPO: ${{ inputs.new_backend_repo }}
      NEW_TYPE: ${{ inputs.new_backend_type }}
      NEW_CAPS: ${{ inputs.new_backend_capabilities }}
      NEW_DESC: ${{ inputs.new_backend_description }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7
      - name: Validate and append to registry
        run: bash scripts/notebooklm-register-backend.sh
      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          BRANCH="feat/notebooklm-backend-${NEW_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add config/notebooklm-backends.yml "docs/${NEW_ID}/"
          git commit -m "feat(notebooklm): register ${NEW_ID} backend"
          git push origin "$BRANCH"
          gh pr create \
            --title "feat(notebooklm): register ${NEW_ID} backend" \
            --body "Adds **${NEW_NAME}** to the NotebookLM backend registry.

          - **ID:** \`${NEW_ID}\`
          - **Type:** ${NEW_TYPE}
          - **Repo:** ${NEW_REPO}
          - **Capabilities:** ${NEW_CAPS}

          Review \`config/notebooklm-backends.yml\` to add required \`auth\` secrets and update \`notes\`." \
            --head "$BRANCH" \
            --base main

  generate:
    name: Generate — ${{ github.event.inputs.backend || 'google-notebooklm' }}
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'generate' || github.event.inputs.action == ''
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7

      - name: Resolve backend config
        id: backend
        env:
          BACKEND_ID: ${{ inputs.backend || 'google-notebooklm' }}
        run: bash scripts/notebooklm-resolve-backend.sh

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # ratchet:actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Generate content
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
          BACKEND: ${{ inputs.backend || 'google-notebooklm' }}
          CONTENT_TYPES: ${{ inputs.content_types || 'audio-overview' }}
          DOCS_DIR: ${{ steps.backend.outputs.docs_dir }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          SKIP_UPLOAD: ${{ inputs.skip_upload || 'false' }}
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
          NOTEBOOK_ID: ${{ inputs.notebook_id || '' }}
          AUDIO_FORMAT: ${{ inputs.audio_format || 'deep-dive' }}
          VIDEO_FORMAT: ${{ inputs.video_format || 'explainer' }}
          REPORT_FORMAT: ${{ inputs.report_format || 'briefing-doc' }}
          RELEASE_TAG: ${{ inputs.release_tag || '' }}
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          SOURCE_PDF: ${{ inputs.source_pdf || '' }}
          OPEN_NOTEBOOK_URL: ${{ secrets.OPEN_NOTEBOOK_URL }}
          OPEN_NOTEBOOK_API_KEY: ${{ secrets.OPEN_NOTEBOOK_API_KEY }}
          OPENBOOKLM_URL: ${{ secrets.OPENBOOKLM_URL }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: bash scripts/generate-notebooklm.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: notebooklm-${{ inputs.backend || 'google-notebooklm' }}-${{ github.run_number }}
          path: /tmp/notebooklm-output/
          if-no-files-found: ignore
          retention-days: 7

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          BACKEND: ${{ inputs.backend || 'google-notebooklm' }}
          BACKEND_NAME: ${{ steps.backend.outputs.backend_name }}
          BACKEND_TYPE: ${{ steps.backend.outputs.backend_type }}
          DOCS_DIR: ${{ steps.backend.outputs.docs_dir }}
          CONTENT_TYPES: ${{ inputs.content_types || 'audio-overview' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          echo "## NotebookLM Generation — ${BACKEND_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          printf '| Field | Value |\n|---|---|\n| Backend | `%s` |\n| Type | %s |\n| Content types | `%s` |\n| Docs dir | `%s` |\n| Status | %s |\n| Dry run | %s |\n' \
            "$BACKEND" "$BACKEND_TYPE" "$CONTENT_TYPES" "$DOCS_DIR" "$JOB_STATUS" "$DRY_RUN" \
            >> "$GITHUB_STEP_SUMMARY"
