name: Bugzilla Failure Reporter

# Files or updates a Bugzilla bug when a monitored workflow fails.
# Deduplicates by workflow name — adds a comment to an existing open bug
# rather than filing a new one each time (configurable in config/bugzilla.yml).
#
# Also comments on the bug when a previously-failing workflow recovers.
#
# No-ops silently if BZ_URL / BZ_API_KEY secrets are not set.

on:
  workflow_run:
    workflows:
      # ── Tier 1: CRITICAL ──────────────────────────────────────────────────
      - "Flush Lifecycle Manager"
      - "Full Chain Flush"
      - "Pre-Flush Prep"
      - "Post-Flush Prep"
      # ── Mirror chain ──────────────────────────────────────────────────────
      - "Mirror Interested-Deving-1896 → OSP"
      - "Mirror OSP → OOC"
      - "Verify Mirror Integrity"
      - "Pre-Mirror CI Gate"
      # ── Sync ──────────────────────────────────────────────────────────────
      - "Sync All Forks"
      - "Sync Registered Imports"
      - "Sync Shell Tools"
      - "Sync UAA Vendor"
      # ── Config & validation ───────────────────────────────────────────────
      - "Validate Config"
      - "Rotate Secret Token"
    types: [completed]
  workflow_dispatch:
    inputs:
      workflow_name:
        description: "Workflow name to report (for manual testing)"
        required: true
        type: string
      run_id:
        description: "Run ID to report"
        required: true
        type: string
      conclusion:
        description: "Conclusion (failure | cancelled | timed_out)"
        required: false
        default: "failure"
        type: string
      dry_run:
        description: "Log without writing to Bugzilla"
        required: false
        default: false
        type: boolean

concurrency:
  group: bugzilla-failure-report-${{ github.event.workflow_run.id || inputs.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  BZ_URL: ${{ secrets.BZ_URL }}
  BZ_API_KEY: ${{ secrets.BZ_API_KEY }}
  GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
  REPO: ${{ github.repository }}

jobs:
  report-failure:
    name: Report Failure to Bugzilla
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'failure' ||
       github.event.workflow_run.conclusion == 'timed_out')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install pyyaml --quiet

      - name: Report failure
        env:
          FAILED_WORKFLOW: ${{ github.event.workflow_run.name || inputs.workflow_name }}
          FAILED_RUN_ID: ${{ github.event.workflow_run.id || inputs.run_id }}
          FAILED_RUN_URL: ${{ github.event.workflow_run.html_url || format('https://github.com/{0}/actions/runs/{1}', github.repository, inputs.run_id) }}
          FAILED_CONCLUSION: ${{ github.event.workflow_run.conclusion || inputs.conclusion }}
          BZ_DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: bash scripts/file-bugzilla-report.sh

  report-recovery:
    name: Report Recovery to Bugzilla
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install pyyaml --quiet

      - name: Comment recovery on existing bug
        env:
          BZ_DRY_RUN: "false"
        run: |
          source scripts/includes/bugzilla-api.sh

          if ! bz_is_configured; then
            echo "Bugzilla not configured — skipping recovery comment"
            exit 0
          fi

          CONFIG="config/bugzilla.yml"
          COMMENT_ON_RECOVERY=$(python3 -c "
import yaml
c=yaml.safe_load(open('${CONFIG}'))
fr=c.get('failure_reporter',{})
print(str(fr.get('comment_on_recovery',True)).lower())
" 2>/dev/null || echo "true")

          [[ "$COMMENT_ON_RECOVERY" != "true" ]] && exit 0

          WORKFLOW="${{ github.event.workflow_run.name }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          PRODUCT=$(python3 -c "import yaml; c=yaml.safe_load(open('${CONFIG}')); print(c.get('product',''))" 2>/dev/null)

          [[ -z "$PRODUCT" ]] && exit 0

          # Find the most recent open bug for this workflow
          SEARCH=$(python3 -c "
import urllib.parse,sys
print(urllib.parse.quote('[FSA] ' + sys.argv[1]))
" "$WORKFLOW" 2>/dev/null || echo "")

          [[ -z "$SEARCH" ]] && exit 0

          PROD_ENC=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${PRODUCT}'))" 2>/dev/null)
          result=$(bz_search "product=${PROD_ENC}&summary=${SEARCH}&status=NEW&status=UNCONFIRMED&status=ASSIGNED&status=REOPENED" 2>/dev/null || echo "")

          BUG_ID=$(echo "$result" | python3 -c "
import json,sys
d=json.load(sys.stdin)
bugs=d.get('bugs',[])
if bugs:
    bugs.sort(key=lambda b: b.get('last_change_time',''), reverse=True)
    print(bugs[0]['id'])
" 2>/dev/null || echo "")

          if [[ -n "$BUG_ID" ]]; then
            COMMENT="✅ Recovery: ${WORKFLOW} completed successfully.

Run: ${RUN_URL}

Automated recovery comment from bugzilla-failure-report.yml."
            bz_add_comment "$BUG_ID" "$COMMENT"
            echo "Added recovery comment to bug ${BUG_ID}"
          else
            echo "No open bug found for '${WORKFLOW}' — nothing to update"
          fi
