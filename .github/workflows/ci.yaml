name: CI

on:
  push:
    branches: [main]
    paths:
      - 'tests/run-tests.sh'
      - 'profiles/**'
      - '.github/workflows/ci.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'tests/run-tests.sh'
      - 'profiles/**'
      - '.github/workflows/ci.yaml'

permissions:
  contents: read

jobs:
  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Run shellcheck
        run: find . -name '*.sh' -exec shellcheck -x -S warning --exclude=SC1083 {} +

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Run tests
        run: ./tests/run-tests.sh

  validate:
    name: Profile Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6

      - name: Validate profiles
        run: ./profiles/validate.sh
