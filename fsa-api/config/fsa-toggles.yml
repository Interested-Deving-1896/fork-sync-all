# fsa-api/config/fsa-toggles.yml — FSA API feature toggles
#
# Each toggle gates one or more API routes (see fsa-routes.yml).
# Set enabled: false to disable a route group without removing it.
# fsa-start.sh reads this file at startup; changes require a server restart.
#
# Fields:
#   enabled     — true (default) | false
#   description — human-readable purpose
#   affects     — list of route paths gated by this toggle

toggles:

  notifications:
    enabled: true
    description: GitHub notification listing and auto-triage endpoints
    affects:
      - /api/fsa/notifications
      - /api/fsa/notifications/triage

  onboarding:
    enabled: true
    description: Repo onboarding workflow dispatch endpoint
    affects:
      - /api/fsa/repos/onboard

  flush_pipeline:
    enabled: true
    description: Chain flush dispatch endpoint (high-impact operation)
    affects:
      - /api/fsa/chain/flush

  bdfs:
    enabled: true
    description: bdfs workspace export/import endpoints (self-hosted runners only; degrades gracefully when bdfs not installed)
    affects:
      - /api/fsa/bdfs/status
      - /api/fsa/bdfs/export
      - /api/fsa/bdfs/import

  security:
    enabled: true
    description: dev-machine-guard security scan endpoint
    affects:
      - /api/fsa/security/scan

  docs:
    enabled: true
    description: Docs/publishing endpoints — book, readme, translate, sbom, notebooklm, gitbook
    affects:
      - /api/fsa/docs
      - /api/fsa/docs/status
      - /api/fsa/docs/content
      - /api/fsa/docs/dispatch

  deployments:
    enabled: true
    description: Multi-deployment management — list, status, workflows, dispatch across all FSA instances
    affects:
      - /api/fsa/deployments
      - /api/fsa/deployments/:id/status
      - /api/fsa/deployments/:id/workflows
      - /api/fsa/deployments/:id/dispatch
      - /api/fsa/deployments/:id/codebase

  codebase:
    enabled: true
    description: Codebase self-awareness — git status, cross-deployment drift, changelog, self-sync
    affects:
      - /api/fsa/codebase/status
      - /api/fsa/codebase/drift
      - /api/fsa/codebase/log
      - /api/fsa/codebase/sync
